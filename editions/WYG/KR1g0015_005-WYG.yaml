body:
  text: 五經蠡測卷五明蔣悌生撰毛詩周頌於穆清廟肅雝顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯即其地而觀助祭德容之盛則先王德澤之在人心而不可忘者可知也蓋宗廟所以萃人心之地也文王不可得而見矣而德澤之在人心者固有在也今也即清廟之地而觀之則見其助祭之諸侯旣盡其和敬之容而執事之臣又皆能執行文王之德對越在天之神旣能盡其純一之誠奔走在廟之主又能各執其事而無失苟非文王之德入於人心者没世而不忘愈久而益著何以能使人承奉不怠若是哉噫觀人心所萃之地其可以昭聖德之所在矣維天之命於穆不已於乎不顯文王之德之純假以溢我我其收之駿惠我文王曽孫篤之天道深逺而無窮聖德純一而不雜所以稱賛文王者無他辭但曰文王即天也後王對越之頃所以冀望怙冐之意顯如在上而期於無窮也烈文辟公錫兹祉福惠我無疆子孫保之無封靡于爾邦維王其崇之念兹戎功繼序其皇之王者於助祭之諸侯旣加歸德而思其在己者保守於不窮復加戒飭而欲其在彼者亦光顯於後世夫王者之建侯何莫非藩屏王室欲其與國咸休歴世無窮者而國家盛大之福亦莫非祖宗積功累仁之所致今乃歸德於諸侯而以錫福為烈文辟公之功蓋前人創業之艱難故我今日得以告成功于神明而來助祭之諸侯苟非兄弟甥舅之國則常左右先王以共承王業勲勞著於王家者也而又可㤀乎所謂錫祉福念戎功者葢非虗譽也今我旣蒙其功而使我之子孫世世保守而勿失矣我其可不使辟公之子孫亦世世保守而益大其業乎必也克儉于家謹爾侯度無厲民以自奉宜節用而愛人夫然後為天子所尊崇而繼序益大其業也始也歸美於諸侯而思我之子孫保守於不窮終也致戒於諸侯而欲諸侯之子孫亦保守於永久成周之天子諸侯交相親愛之情至矣維清緝熙文王之典肇禋迄用有成維周之禎此詩言王者能日新舊章積久而成一代之典實國家之大慶也夫聖人作為法制以遺後人正欲後人守而勿失以爲後世法也後王誠能舉先王之舊章旣清明之又緝熙而光明之使自始祀至今愈久而益彰定為一代之典籍真可以成功告於神明矣國家禎祥孰大於此天作髙山太王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之地利出於天而成於累聖之功後王當保守而勿失也夫王者創業而至於守成其積累之難夫豈一朝一夕之可致哉岐山之高大山河險固土地腴饒乃鴻荒以前出於天之所造也天能作之而不能治之太王能治之而不能久安之及至文王承太王王季之緒政治日隆歸附日衆然後昔日險僻之岐山今為平易之道路為子孫者覽天造之肈設念積累之艱難雖有賢聖之君亦不能以一世而成必也聖祖神宗相繼而出然後成今日之丕緒則思所以保之者宜無不盡其心矣昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之天有定命而累聖開於前後王當盡繼述之心而安天下也夫前王創業之難與後王守成之難皆甚重也自後王而觀之則前創業之難既已徃矣而守成之難正後王所當盡心也是以不敢寧居夙興夜寐求所以積累於下以承藉於上當宏深而静宻宏深則為廣大深逺之計而非狹隘近小之謀静宻則有沉潛周緻之慮而無更變罅隙之失非宏深則不能承載在上之重而易傾非静宻則無以安帖前定之規而易摇使文武之道繼續光明常久而不息盡其繼述之心不敢少怠故能安靖天下而保文武所受之成命也惟其不敢康是以盡心於宥宻之務惟能盡其心故能安天下而告成功蓋盡心者不敢康之本而肆靖者基命之效也我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王旣右享之我其夙夜畏天之威于時保之王者祀祖配帝之禮極情文以格夫神者其分殊致誠敬以保其眷者其理一故備儀以格天之辭不敢必而法祖格神之辭若可必天尊而文王親其分殊故也至於夙夜畏天以保天與文王眷顧之意則天與文王無間也夫天人之分逈殊而赫赫在上之威不可以輕䙝故奉持其牛羊以進享雖或盡其純角肥充之牲而冀上帝之居歆誠未敢自謂必然也至於祖宗一氣而分血脉流貫對越之頃事死如事生況我又能法祖以安四方以此情而致祭告之誠則洋洋在上綏我思成若有以見其必然矣尊莫如天畏天所以畏文王也親莫如文王法文王所以法天也天與文王一也傳引陳氏説以郊祀后稷以配天為尊尊以宗祀文王于明堂以配上帝為親親然此章二節本文已自有尊尊親親之義二説宜並用儀式刑文王之典日靖四方伊嘏文王旣右享之我其夙夜畏天之威于時保之盡繼述之道而能感格者其心無所不足存敬畏之誠而思保守者其心不敢自足大抵古之賢王未嘗以政治之旣安者為足恃而毎以命之不忱者為難保是以安逸放肆之情未嘗少縱於治定功成之日而戒謹恐懼之意常存於四海無虞之時成王能法祖安民而文王來享錫之以福已可必矣於斯時也宜若可以少安而自逸而成王之心不敢以是為足恃也敬謹之心無所不至夙興夜寐常存戒謹畏天之威赫赫若臨求所以保天與文王降監之意固未嘗少息也夫人心莫善於不自恃莫不善於有所恃蓋有所恃則驕驕則怠心生怠心生則肆情縱欲無所不至治日退而亂日進矣不自恃則知懼懼則善心生善心生則思患預防無所不至可以持盈守成愈久而不失矣明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之革命之君廵狩天下敷一代黜陟之典而示以偃武修文之意則信乎其能保天命矣蓋賞罰者人主之大柄而文敎者尤武功之後所宜崇也今武王於革命之初巡狩天下旣以慶讓黜陟之典以序四方來覲之諸侯且告之以櫜弓戢戈以示兵不復用將求美德布于中國以益修其文治則經綸天下之大經大法備矣信乎武王之能保天命也夫當武功戡定之初天下之人去昬而就明革故而鼎新方將精白一心延頸洗耳以聽新主之號令以迓隆平之化而王者亦思洗滌磨刮革釐舊俗損益斟酌禮樂刑政以與天下更始於斯時也苟非明一代之典布維新之令使慶賞刑威咸適其宜文武咸備不踰其則亦何以新天下之耳目聳四方之觀聽使之心悦誠服朝覲而述職者哉實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之推天眷之隆而主人神者其克君為可信明一代之典而敷文敎者其保天命尤足信也蓋為君者人神之主而賞罰文德又王政之大綱也上天之眷顧固於人神之依歸而騐之而所以得天心而保天命者又豈有出於刑賞文德之外者哉執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其明鐘鼔喤喤磬筦將將降福穰穰降福簡簡威儀反反旣醉旣飽福禄來反聖功大而繼世有明德故能享王業而益著其明聲樂和而神錫以多福尤當加敬畏而益厚其禄蓋繼世而有天下者莫大於能明其徳而保其禄於無窮者尤在乎能存敬畏之心也詳此詩所謂奄有四方一句在文武時已然以之頌成王康王恐未是告成功盛大處所謂不顯成康疑只是稱武王能成安天下之功也蘇氏已有此説更詳之思文后稷克配彼天立我烝民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏此詩言聖人之德足以配天者在夫養民極其至而敎民尤盡其道也朱傳於章㫖下疑脱一句云此郊祀后稷以配天之樂歌嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鏄奄觀銍艾王者之命農官旣戒其正長而舉農務之綱復申命其副而析農功之目也甚矣周家之重農也嗟歎以𤼵其慎重之辭歎美以致其勸勉之意其亦以是為天下之大本也歟蓋農政有常典居其職者當受成於公家以振其綱農功非一端為其副者當率人於田畝以治其事惟其事之在人者苟勤慎而無失則利之在天者將有不期而自至者矣舉其綱者約一言而可足詳其目者非屢言而莫悉也天時則不可失地利有不可遺在已之職分不可以不專農具之所需必得其利器用又當勤修人事以上荅天休問辯之反復欲其理明於心聲嗟而屢歎欲其聽之審而無忽也噫嘻王者戒農官以田事欲其地不遺利而民不遺力也振鷺于飛于彼西雝我客戾止亦有斯容在彼無惡在此無斁庶幾夙夜以永終譽此言先代之後來助祭者不惟貌之美而心即其安宜夫令聞之不已也此可見古之君臣皆公天下以為心者也蓋先代之後作賔王家自常情之迹而觀乃易生嫌疑者也苟徒修飭於外貌而心猶有所未安則嫌疑之易萌而不能久處於其位況望其令譽之能永乎今觀其容之潔白有天然之美而其氣之和又即其人心之安蓋我以公天下為心而革其命彼之心固無惡彼亦以公天下為心而臣服助祭我之心亦無所厭表裏之俱美彼此之相安是以能統承先王修其禮物與國咸休歴世無窮而永終此譽也豐年此詩言田事畢而足食祀典備而得福皆古人務本之效也此詩為秋冬報賽田事之樂然玩其辭意觀其氣象可以見先王所重民食敎民務本田事旣備民食旣足由是報本追逺親賢樂利民徳自然歸厚天下不勞而治可見矣有瞽此詩言樂官設而得其地其器之大小者無不全樂音和而格夫神其心之難平者無不悦潛此詩言先王報本追逺之心無時而忘固不以時物之微者而廢其禮也有來雝雝至止肅肅相維辟公天子穆穆於薦廣牡相予肆祀假哉皇考綏予孝子宣哲維人文武維后燕及皇天克昌厥後綏我眉壽介以繁祉旣右烈考亦右文母此詩言助祭來而德容無間於君臣則其禮儀之盛固可以感格而安其所思聖德備而惠澤兼被夫上下則福禄之及斯可以遂志而徧其所親載見辟王曰求厥章龍旂陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享此詩言諸侯朝覲而稟王法旣備其車服之美助祭而獻先王斯可盡繼述之心蓋後人之祀其先王正以其能守成法而諸侯之述職者皆不敢踰於法制之外也今其來覲者皆曰我將見於王而稟受法度也觀其龍旂則陽陽然而光耀聽其和鈴則央央然而和鳴而鞗革之垂又有鶬而相應豈惟其車服之美若是哉蓋由其能禀法度故人見其儀文之美自有光輝耳故我率之以見于武王之廟奉璋祼獻可以孝享而無愧於先王也載見而諸侯事君之禮備矣率見而孝子事親之心至矣有客此詩言先代之後能修舊禮而從臣亦各慎其儀宜夫天子愛之而無己也大㫖與振鷺同意有瞽曰我客戾止永觀厥成那頌曰我有嘉客亦不夷懌虞書曰虞賔在位羣后徳譲古人以此事為盛典武此詩本象武王之武功故稱聖功之大必推本而言聖人以文德啓於前而嗣王以武功定於後也閔予小子此詩言成王遭憂而心有不勝故歴叙前聖而思繼承之道也訪落此詩言成王始涖政而憂負荷之重故反復致其艱難之辭思繼先王之法以求治安也大率與閔予同意敬之敬之天惟顯思命不易哉無曰髙髙在上陟降厥士日監在兹惟予小子不聦敬止日就月將學有緝熙于光明佛時仔肩示我顯德行此詩言成王述敬天之戒必反諸己而思進德以求輔臣之助也夫天之聦明而可畏未嘗不徴諸人而騐之人君苟能持不敢自足之心而求輔助之益則敬天之實亦不外是矣大抵敬天之道不惟知其所可畏尤當知其不敢忽其迹之甚明而可畏者人之所共知而其理之㣲妙而不可測者人之所易忽者也知其無物不體而不敢忽焉則動静云為無不致其敬畏之心矣凡詩中言畏天者非一大明曰赫赫在上我將曰畏天之威板曰昊天曰明及爾出王昊天曰旦及爾㳺衍抑曰無曰不顯莫予云覯神之格思不可度思凡若此類非大聖賢之知天不能為此言成王旣述敬天之戒於前復自為謙退之辭願加不息之功使學進於光明之地蓋成王悔悟之後深服周公之訓雖曰困知勉行而學亦漸進於精宻矣小毖此詩言成王遇禍變而知懼故致其思患豫防之意焉夫天下之患未始不因㣲而至著不懲於始則鮮能善其終能謹於㣲則終無患矣載芟此詩鋪陳農事極有次序載芟載柞至徂隰徂畛言其初至田畔除去草木侯主侯伯至俶載南畆言其人心齊器用利故田畆墾治播厥百榖至萬億及秭言耕耘及時得所是以有收成之利為酒為醴至胡考之寕言惟其收成之多是以祭祀燕享之禮無不足末三句又緫言稼穡豐穣古今内外如一而無間也自始至終其序有條而不紊千耦其耘一句乃在俶載南畆之前恐耘字只是去草皆可訓為耘非必為去苗間草也若以為去苗間草則始耕之時未嘗播種何從有苗緜緜其麃句居厭厭其苗之下語相聫事類相屬正是耘草前耘字只是去田畔之草乃芟柞之緒餘也今人治田於阡陌之界耒耜所不得施或以鉏或以手治而去之於事理可通恐集傳苗字即田字之誤良耜義與載芟同鋪叙農事亦有次序絲衣此詩言與祭之人服美而執事周禮肅而得福備於鑠王師遵養時晦時純熙矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師此詩言聖人待時而興武功故其建非常之業而後人所當法也夫聖人之所以異於人者亦惟當可為而不為必不得已而後為之所以應天順人而莫大之業亦非人所易及也當武王之初有衆盛於鑠之師足以代商而有天下矣而武王方且隠耀韜光與時偕晦及夫諸侯不期而會者八百則天命人心有甚著而不可違者是以一戎衣而天下大定今後王蒙其寵而受此非常之大業則所以繼承之道豈可以他求哉亦惟法武王之所行而已綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之此詩言聖人安民之功大而嘉應之出於天者非止於一時聖人用賢之效廣而明德之著於天者斯表夫一代蓋天眷之厚於聖人與聖人所以荅天心者亦不過能用天下之賢才以安天下之民而已文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思此詩言王者之封建諸侯既述前聖之功而繼世欲廣其安民之心復舉一代之典而使受封者亦致其正始之心蓋分封以安天下不惟後聖以前聖之心為心而又欲諸侯以國家之心為心也於皇時周陟其髙山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命此詩言王者巡守而周四嶽蓋以荅天下仰望之心而布維新之化也集傳亦疑脱一句云此巡守而柴望祭告之樂歌魯頌魯頌凡四篇雖名為頌而體製實與國風無異泮水閟宫二詩多是祝頌稱願之辭非實盡有其事若周頌所言多是聖徳大功語簡約典重初讀若冷淡讀之愈久但覺意味深長故章章句句儘可敷衍尋繹有無窮義理若魯頌所言既未是盛徳大功而語又過於富贍初讀若可喜及再玩之後氣味索然矣讀二頌當如此分别商頌猗與那與寘我鞉鼔奏鼔簡簡衎我烈祖凡二十二句樂之作自黄帝時已有之夔之樂神人以和祭祀有樂虞夏時皆然但頌之名始於啇耳商人尚聲尚鬼尚質今觀那詩大抵言聲樂之盛詩本一章朱子集傳分為五節今詳首一節四句朱子直以韻分詳詩本意當分六句一節第二節亦六句此二節言樂之始作而衆音統於一既有以致其如在之誠樂之並奏而衆音協於一又有以昭其君徳之美衆樂之中鼓為大首節言奏鼔舉其大以包其小也二節言依我磬聲八音惟石最難諧舉其難以見其易也綏我思成繫於首節之下以明一念孝思有其誠則有其神也於赫湯孫穆穆厥聲繫于二節之下以明聲容之實聞其樂而知其徳也二節又承上文言樂作而可以格夫祖則神無不和矣堂下之樂皆依於堂上之玉磬則音無不和矣至於人心之難和者先代之後今鐘鼔交作萬舞陳于庭而祀事畢雖嘉賔亦莫不和平而懽悦則人無不和自始至此皆言聲樂之和故第四節言今日作為宗廟之禮如此者非今日之所專也葢自上古先民之時已然恭敬之道相傳已逺故我今日亦不敢廢怠也温恭敬之發於容者也有恪敬之見於行事也噫金聲玉振而始終條理之不紊聞樂知徳而古今一敬之流通真可謂猗與盛哉故末句緫結其意庶幾其顧我烝嘗乎是乃湯孫之所進也爾汝其辭如事生覿省相語此質實之至也又案風雅凡二百七十一篇無有一章者周頌凡三十一篇其每篇無有二章者意者宗廟之樂對越之頃升歌合樂主祭之人齊其思慮之不齊以交於神明凡事皆貴誠一故其樂章亦致其純一不貳之誠而不敢有斷章間歇之義亦猶臣子敷奏於天子之前必精白一心自始至終詳陳備述須意盡而後止非若與他人言可以更端而問荅也然則詩之為樂惟頌用於宗廟故與其風雅或用於朝廷邦國房中鄉人者其體製音節宜有不同商頌存者五篇那烈祖元鳥皆一章恐其義同長𤼵􅇻武二篇又各分章又不可曉豈商之初定為一章其後體製復變三代禮樂至周始備周公定禮樂頌始定為一章而不可改也與魯頌四篇皆無有一章者觀其體製與風雅無異想其一時音節亦必與周頌不同但今不可考耳孔子曰吾自衛反魯然後樂正雅頌各得其所當時體製音節具存今音節不可復考即其體製猶可以想見其音節也嗟嗟烈祖有秩斯祜申錫無疆及爾斯所既載清酤賚我思成至湯孫之將此詩傳亦分為四節也第一節言湯之功大其福宜久故子孫蒙其澤得以今日修其祭祀也二節遂言祭祀之事言神之來格而錫以福不徒在乎物味之兼美而尤在乎人心之齋敬也三節又言諸侯助祭有車服之盛故率之以獻於先王之廟皆由我受命廣大致然也我受命既廣大而天錫以休徴之應繼續而不棄則神格而得福宜矣以假以享諸侯之􅄒職也來假來享孝子之事親也末又緫結如前篇所云二詩辭意大抵相類而那為盛故正考校商名頌以那為首亦不苟天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有至百禄是何此詩傳亦分為五節以叶韻首章言契之生異於人故傳至湯而有天下皆天所命猶生民述姜嫄生后稷之意也二節三節言成湯之後三宗迭興君徳治道足以受天命安而不危至於武丁孫子猶能執賞罰之柄以御天下其威靈氣焰足以震懼天下之人故四方諸侯各以其職來祭無敢踰於法制之外者夫商有天下六百餘年至武丁孫子猶能若此則五百年之間商之威令可謂盛矣不若東周以後衰微王令不行也書云自成湯至于帝乙㒺不明徳恤祀㒺不明德慎罰騐之詩而益信孟子賛商之徳云天下歸殷久矣文王由方百里起是以難也武王革商之後以文武周公積累之仁殷民懷其舊章屢臣屢叛商之徳其盛矣乎末二節言商后治天下之道出治之序則篤近而舉逺聲教之歸則由逺而即近也長𤼵首章二章言契之生既異於常故其五典之敷逺近大小莫不順從其教傳至相土益大其業與元鳥首章意同猶周述后稷公劉之義三章言湯之生與天之歴數際㑹而湯之所存實與天同其徳故始終言帝命以明天與成湯而已四章言成湯居中而有以繫夫人心由其能建中而有以繫夫天心夫聖王之得夫天者必於得夫人者而騐之而所以得夫天人者亦由其能用中道以為政於天下也成湯之王天下五等邦君或小或大執玉而朝覲者如旒之綴於冕弁有所繫屬而不離此其繫夫人心者然也然何以能致是哉觀其𤼵於政也既不競而失之急亦不絿而失之緩既不剛而太強亦不柔而太弱皆以中道而無過不及之差是以施於庶政綽乎寛裕而天眷之隆百禄皆來集也噫中天下而立而四海歸向之攸同用其中於民而天命眷顧之益厚成湯王天下之道至矣孟子曰湯執中仲虺作誥曰王懋昭大德建中于民又曰克寛克仁彰信兆民此之謂也五章大㫖與四章同但表出一勇字蓋賛湯之德不可不以勇稱聖人之勇所謂聦明睿智神武不殺故無震動戁竦四者之失六章言湯征伐之序七章言湯得伊尹而有天下皆天所命非人所能書稱湯德亦曰天乃錫王勇智殷武首章緫序其伐楚而平治之大綱二章言髙宗伐楚舉舊典以責之乃王者問罪之師也三章承上文言王者有問罪之師則諸侯有述職之典以終二章之意諸侯之職非一端獨言稼穡者以飬民為重也四章言天人之理合一賞罰乃人君之大柄賞罰既皆當理則人心服而天亦錫以福矣五章言王室乃侯邦之表京師整齊則威靈氣焰赫然動人四方莫不服從此言髙宗中興之盛如此亦以終四章之意也六章傳曰其意未詳五經蠡測卷五
