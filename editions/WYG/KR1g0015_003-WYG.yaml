body:
  text: 五經蠡測卷三明蔣悌生撰毛詩小序辯説書小序與詩小序雖皆昔人序作者之意然二序關於後學功效大不侔書序可無詩序不可無難一概論也盖書者當時紀載之書其本文史臣已序作者之意如五子之歌太甲說命等篇史臣既序其作書之由篇中更端處史氏又以語貫之已極詳明雖小序不作後世讀者依文求義自能通之無所賴於小序之複出也若詩之作或歌詠性情或鋪陳政事或稱頌功德又多比興之辭故其所作之由與其所指之實多不具於詩文之中而皆含於言意之外苟無小序以識其所由則後之讀者貿貿然又孰知其為何等之言而述何時何人之何事哉然則詩序之有功於後學固不可與書序例論也先儒謂詩序孔子所作又以為子夏所作雖不可盡信然夫子刪詩既定子夏以文學名平日師弟子問辯之頃豈無一言及此以詔後世但戰國之末遭秦焚坑漢初鹵莽百餘年間正經尚錯亂磨滅不得其全况序文乎意者孔子子夏亦必有作但失其全及漢興文教之後多出於漢儒附㑹補緝耳惟其或有出於漢儒之手及朱子作詩集傳見其穿鑿紕謬恐其有誤後學故力排之以為不足信然排之恐有太過使其中有可存録者亦為謬陋者所累而類入於排斥之例則其間或有聖賢之言而受漢儒之誣誠為未安愚自幼讀書詩頗有惑於此今細推之誠有若可疑者非曰敢僭議朱傳之得失恐後學遂輕小序而忽易之亦非所宜故不得不詳辯於左以俟後之君子正焉大序論者謂詩大序非聖人不能作今細玩之議論推原各有斟酌無可議者惟國史二字尚在擬議其餘全篇絶似聖人之言又案古者史掌書矇誦詩朱傳據此以明國史二字之矢固為允當然細推之史掌文書則凡文書皆當屬史氏所掌意者采詩之時皆總歸國史條其篇類明其義理然後轉授瞽矇使誦於王之左右不然則矇乃無目之人若非他人相而詔之又何從知其條類義理而誦之邪國風凡若干篇姑舉大㫖著於後周南關雎小序惟以哀樂淫傷分為四段誠為紕謬其餘非孔子之徒不能作意者全文皆得其傳至漢儒説詩復以己見鑿說附其後耳葛覃小序之意謂后妃幼而在家其德己如是長而為婦其德不回亦無甚謬戾傳譏其淺拙猶恐太過卷耳當闕螽斯小序若螽斯三字當在則子孫衆多之下桃夭文王之化正家之道莫盛於后妃妃之德莫盛於不妬忌小序之言亦未為失傳譏其踈狹亦太過􅆯同上漢廣小序德廣之廣與經文漢廣之廣偶重耳文義末見有謬外樛木芣苢汝墳麟趾四序朱子悉從序説右周南十一篇朱子所存已居十之七其貶之太過才十之二三則小序有功於詩誠未可以少訾也召南鵲巢至騶虞凡十四篇草蟲序言能以禮而自防意亦在其中未為失殷其靁序言勸以義意亦在其中右召南十四篇朱子從序說已不啻十之九貶之太過才十之一又何必貶之邪􅆁栢舟此篇小序朱傳極貶之然以仁人不遇小人在側之義求之經文亦未為害義亦安敢必其非頃公之時所作亦安敢必其非男子之詩亦安敢必其非不遇於君乎誠未敢輕議也孟子引詩憂心悄悄愠于羣小意集註仍用序説朱子四書工夫尤為精密當從集註為定緑衣至終風四篇朱子本皆從序説而貶之太過遂復以日月終風二篇為非因州吁之難而作今觀詩文所謂無良所謂暴所謂謔浪笑傲等語又豈宜施於莊公者若反序說而欲更置此二篇於燕燕之前恐傷已甚孰若只從序説而亦無害於義乎必欲篇篇有旁証然後從序説則焚坑已後經籍散失何限安能一一求明文為証騐哉此别具辯說於後擊鼓國人怨其勇而無禮亦一時作詩之人所見如此况勇而無禮則亂以之目州吁亦當乃若君臣之大義未可以之而罪小序也凱風此七子自責之辭非美七子而作也雖然天子遣使觀風於侯國采詩而列於樂官以時存肄於以考政俗之美惡及孔子刪詩三百篇義尤精則此篇之存乃所以美七子之能盡孝道又何必辯其七子之自作而非羙之乎谷風下之惡俗何莫非上之化北風淫亂則政刑失所威虐亦宜有之况北風雨雪乃若威虐之狀靜女序說全無味右邶風十九篇朱子不信者二篇其他皆擿抉太過鄘風七十篇朱子皆因舊説氓序謂刺時美反正者亦曰困而自悔良心復萌耳亦無大害木𤓰恐依序説亦通右衞風凡九篇朱子亦據序説惟芄蘭一篇闕疑王十篇内惟采葛邱中有麻二篇不依序説其餘八篇朱子於序文雖辨其誤然集傳大指又皆從序文意如黍離等篇亦别無所據若使不因序文而知其説則世讀詩者從何而求義乎又如邱中有麻等篇朱子以為淫奔之詞語意不莊固是然若鄭緇衣豳伐柯等篇設無傳記証據或錯簡脫在鄭衞淫奔之間又安知其不指為淫奔之詞而知其為好賢好德而作歟誠不可輕排小序也鄭緇衣從序將仲子序說誠不切叔于田大叔于田序說未為失清人有據羔裘遵大路女曰鷄鳴三序未必非有女同車此序朱子貶之議論極正大山有扶蘇籜兮二序無情理狡童此序朱子正其失議論極正大褰裳至揚之水凡六篇除東門之墠一詩從序説其餘五篇朱子皆以為淫奔之詩極勝小序之説出其東門野有蔓草溱洧三序説未必非右鄭風二十一篇朱子從序説纔三篇其餘皆斥其非不啻十之九最是有女同車狡童二詩序說誠謬朱子之論明白正大深有關於世教又足以騐聖人放鄭聲之言可為萬世不易之定論要之朱子斥小序其原皆由鄭風故施及他風爾若叔于田遵大路風雨子衿等篇姑從序説淫奔之詩亦已多矣何必盡反序説而後為鄭聲淫乎齊風凡十篇朱子本皆從序説其譏之者皆可畧也如鷄鳴還言未見為哀公時詩甫田盧令未見為㐮公時或有傳授亦不可曉東方未明言挈壺氏失職亦非害義魏風凡六篇詳朱子之意本亦皆從序説惟十畆之間伐檀碩鼠三詩貶之今詳序説亦非無理盖國削民無所居思擇幽曠之地而樂業在位無功而食禄異於君子之不素餐有司重歛亦出於人君政化所及序説與詩文非相悖唐風凡十二篇詳觀序説皆無深謬朱子雖加譏斥然㫖意事實亦多從之如無衣一篇朱子斥其美字大悖理一叚議論附於春秋之義固人道之大經然當時晉之臣子心歸武公誠喜而美之亦非小序之罪且詩著其實春秋正其義初不相悖也秦風凡十篇序説大抵無甚失只無衣蒹葭晨風三詩朱傳不從今觀蒹葭序説誠無意者當時賢人君子喻道之詩託為此言以見道在邇而求諸逺事在易而求諸難之意若是一時實事則所謂伊人既知在水一方何不即遡遊從之當得其人之所在而乃先遡洄從之及至道阻且長而後遡遊從之又見在水中央而不可即可見是託辭喻意非指實言也盖岐豊之地文王周公之澤未冺豈無君子在野而託為此詩者乎别為一説衍義於左亦未必其然也願與諸同經者商之晨風序未敢辨其非無衣序朱傳言與詩情不協今詳王于興師一句大有擬議秦侯邦伯爵也何言王于興師盖秦都岐豐之地本王畿之所時秦伯好攻戰故民思周室盛時兵以義舉有征無戰不若今日之互相攻伐無已也序所謂亟用兵而不與民同欲非無意陳風凡十篇序説亦無大失傳直以時世無所據而斥之矣檜風凡四篇匪風序説思周道亦謂顧適周之路而思周之盛時耳意亦通曹風凡四篇鳲鳩詩言正是四國等語在周之世惟周公可以當之疑豳風脱誤在此非曹風詩也别具一説於左豳風凡七篇朱傳大抵皆從序説其斥之者皆可畧也如東山詩序非子夏之徒有所傳授不能及此如此序之類讀詩者安可忽而不讀二雅三頌凡若干篇今逐篇徐玩而細求之亦不敢屑屑一為之辨大抵作詩之由朱子皆從序說其排斥之者大槩有三一則以其時世人民不可考不足信一則以其篇篇為美刺而作有失敦厚温柔之教一則言其行説穿鑿破碎不成文理今細推之古人之詩必時人有為而作若必去其時世與人則何以考其所言之義理乎若曰彼無所據不敢信其是則我無所據亦安敢辯其非美刺者詩之本體詩正得失得則為可美失則為可刺二字之義固在未作詩之前詩既作則美刺自見乃本然之固有非旁立此名以附益之也必欲詩不專為美刺而作則在風何以考政俗之美惡於雅何以别正變之異宜哉若小序之鑿穿謬妄不為無之盖詩序之作非出於一人一章之中亦非出於一手此為不易之定論其間或得或失難以槩觀或有關於大義甚悖理者固不容不辯如卷耳進賢險詖等語鄭風狡童之類此大悖理也關雎哀樂淫傷分為四段此穿鑿破碎之類也雨無正雨自上下等語淺陋迂僻之類也可去可存皆不害義則莫若存之為長如葛覃在父母家之類是也朱子勤儉敬孝四語義甚精宻亦從小序中衍出或從舊説或立别説皆通則莫若從之為穩如漢廣德廣所及邶栢舟仁人不遇之類是也推此以及三百篇中皆可類推以盡其餘如行葦序所指數事乃詩文有其語有其義當時有其事故序文及之非破碎之罪也及如魯頌駉商頌那二序所言事實文勢極相類傳以國語有據而信那以史克無據而排駉設若國語亦無據將亦在排斥之例矣恐此類皆冝從序説為是務農重榖然後國以富彊在春秋傳非無據恐非鑿説推此以及三百篇亦可類推以盡其餘又如大序關雎小序大段變小雅六月序二十三條廢缺之類苟非孔門師友平日講明有所傳授恐庸儒未易及此今因朱子斥小序太過别為一編以還其舊後之讀者未知其由徃徃輕忽小序棄而不讀殊不知詩之大綱大要具於小序中不為少若忽而不讀亦非小失也漢儒引小序冠於篇端反若先有序而後有詩遂使後人尊信小序過於信詩誠為謬戾朱子若不滿於此故别為一編以還其舊然而後學遂輕小序職此之由盖嘗反覆思維比之春秋仲尼作經丘明作傳非經無以統傳非傳無以証經使當時苟無丘明作傳則春秋之義後世亦難明故先經後傳理勢宜然公榖義同竊意詩序亦當如此有詩然後有序其義始著想三千之徒學詩聖門亦當如此今欲各引小序綴於詩文之後然後備朱子之說論其得失則小序既不受深貶亦不至厚誣也願與讀是經者更商之愚意朱子平生傳注諸經工夫宏浩四書最為精密其於他經亦惟定其大義為要至於小節目姑從一時之所見纂輯成書若假之以年詩傳亦必有刪改惟屬纊之期不延斯為可恨矣以邶栢舟及孟子集注推之可見國風邶風緑衣至終風四篇辯舊説四篇皆莊姜所作緑衣為不見荅於莊公也燕燕為送戴媯大歸于陳也日月終風為州吁簒立傷已困窮也朱子於緑衣燕燕二篇皆從舊説以日月終風亦為莊公不見荅而作特與舊説異今以莊姜之事反覆參究詳玩詩意恐未然夫莊公惑於嬖妾踈棄莊姜宜其有怨心矣然緑衣黄裏之喻微而不顯緑絲女治之詞婉而不廹及其篇終歸於自省思古之人但欲其無過而已更無一語憾於莊公者固可謂忠厚矣至於無子而養戴媯之子完為己子莊公没完即位嬖人之子州吁弑桓而自立故戴媯大歸于陳而莊姜送之則其悲痛之深困窮之極宜無以加於此時矣其原皆莊公不見答之所致也而燕燕之詩但言涕泣勞心而已非惟無一語追憾莊公之詞而且以戴媯能以先君之思朂寡人為戴媯温惠淑慎之德之實則可以見莊姜之心逹尊卑之分守順承之義安於命分禀賦之常而無一毫怨尤之意坤儀婦德貞淑純備善處夫婦嫡妾之變而不失其正者眞可謂賢而過人逺矣及觀日月終風二詩所謂乃如之人兮德音無良終風且暴謔浪笑傲等語明斥其人之過惡與緑衣燕燕二篇詞意大有遼絶者竊意此語施之州吁則可施於莊公則於義有大不可者莫若姑從序説為是况三百篇次先後已定何必不從序説而移易二詩於燕燕之前盖朱子校讎九經工力宏浩凡若此者容或未改其原皆由見小序謬妄穿鑿多恐誤後學故不信而力排之其間未免疾之太過者則此類是也王風揚之水章彼其之子辯案此篇彼其之子朱傳釋之曰戍人指其室家而言也今詳詩意恐非指其室家疑指當時畿外諸侯或入為卿士如衞侯鄭伯蘇公祭伯凡伯毛伯之類當受命逺戍而方命不行故戍人怨之其言如此何以言之詩人之意以為天下之物莫强於水川瀆之流勢不可遏雖萬斛之舟亦順流而下况束薪乎亦猶王室之尊嚴可畏令出惟行五等邦君雖征伐大故敢不惟命是承况出戍小事乎今悠揚之水柔緩無力至於一束之薪亦不能流其弱甚矣以喻王室既卑威令不振彼當出戍者反强倔不行而使我不當出戍之人代受其勞役則王室衰微甚矣詩意甚明諷詠自見又以國風事類考之言彼其之子凡五其曰邦之司直三百赤芾碩大無朋公行公路皆指一時卿大夫之有權力者若君子稱其室家如北門之室人東門之縞衣綦巾東山之婦歎于室若是而已未見其以此等語目其室家也又况征戍之人初無携其室家同行之理無故而言不與戍申甚無謂也若曰出戍在外懷其室家而為是言則凡國風之中道情思者莫非婦人以君子行役在外而述其思念之情而聖人録之盖以婦人從一而終懷念君子乃情性之正也至於男子之行役而有内顧之憂者但曰憂我父母而已若曰憂其室家則其情義出於私昵淺陋不可以訓豈聖人垂戒之意乎其不可也又明矣吾朱子訓釋聖經以惠後人後學當遵守誦説之不暇又奚敢評論於其間哉然萬一之中竊有所見亦不容不明辯之容或朱子有未改正處亦不可知也夫大舜聖人也舍己從人朱子大賢人也大賢之心不必得為在已失為在人如九原可作質之朱夫子或曰生之言然邶風栢舟序辯案此篇序説以為仁人不遇小人在側而作朱子據列女傳以為婦人之詩遂疑亦莊姜所作一段議論極斥小序之非嘗試以序説參考變雅之中多一時賢人君子不得於君之詩如栢舟首章言不過謂見棄而憂思之深今觀變雅中言憂心殷殷癙憂以痒等語其憂一也二章言我心匪鑒不能度物若能度物則能擇利害輕去就矣兄弟亦不知吾心不可以為依倚欲以是心而徃陳訴之彼乃不察而反逢其怒也變雅中所謂不懲其心覆怨其正旣之隂女反予來赫其意亦不異也三章言我心執守一定非如石席之可移我之所行亦一守其正未嘗二三其德何乃見棄而不我從乎變雅所謂維號斯言有倫有脊哀今之人胡為虺蜴亦此意也四章言覯閔既多受侮不少變雅所謂多我覯􅢌孔棘我圉憂心愈愈是以有侮義亦不殊末章言心之憂矣不能奮飛則悲憤之至託言欲去而不能去之意變雅所謂監觀四方蹙蹙靡所騁人亦有言進退維谷等語意亦相近朱傳謂非男子不得於君之詩今以比類推之則序説亦無害理愚故謂凡若此類從序說亦通别立說亦通則莫若從之為穩特舉此而詳言之後不能縷辯也又古人託言皆以日為人君之象月為后妃之象此篇若如朱傳説乃以日月喻嫡妾則所謂日迺莊姜之自况恐亦未穩或當時有日月薄蝕之事古人重天變作詩者見天變於上政亂於下故不勝悲憤激烈而為是言耳曹風鳲鳩辯案變風陳檜曹三國皆言其國小無政削弱委靡不久滅亡之狀不應曹風四篇之中乃有鳲鳩一篇所美其人之德盛大如許今詳詩文所美之德非惟三國所無實十三國風中所無惟淇澳之詩美衞武公之徳辭語略相近蓋衛武公乃大賢君稱為睿聖武公又入為王朝卿士故其所美亦為盛德如所謂充耳琇瑩㑹弁如星寛兮綽兮伊重較兮等語與鳲鳩其帶伊絲其弁伊騏語意相類所稱有斐君子瑟僩赫喧等語亦與淑人君子其儀一兮其儀不忒語略相當然鳲鳩所言正是四國一語雖衞武公之賢亦未敢當詩人未宜以此稱之詳味詩人所稱之德决非為曹國之君臣及春秋十三國之君臣而作反覆玩味惟周公之德足以當之竊料曹風與豳風聯屬疑豳風脱誤在此耳於是參考豳風詩辭如所謂其儀一兮其儀不忒與赤舄几几德音不瑕語相類其帶伊絲其弁伊騏與衮衣繡裳語相類正是國人四國與四國是皇等語相類若引此詩寘之破斧之下九罭之前其為稱周公之德無可瑕議者今姑作羙周公解於後鳲鳩一母而其子七以喻周公一身而為萬方之所倚頼母常在桑而子毎異木以喻周公常居冡宰之位而所賴於周公以為安養者則或逺或近或内或外或上或下固非一所也所賴於周公者雖有逺近内外之殊而周公推其安養之道以及之則一視同仁初無逺邇彼此之閒也且周公撫安斯世之心念念不忘有如固結又豈有一誠之或緩哉此首章之意也二章專言其服飾之羙盖人樂其德故見其冠帶之尊嚴姣好喜而誦之以見德稱其服之意耳三章言其正己而天下化之實大人之德也四章承上章之意復祝其壽所謂國人乃四國之人也抑萬年之稱乃臣下頌禱天子之辭人臣不敢當周公雖未嘗踐天子之位其實攝行天子之事利澤及於天下真足以當聦明元后作父母之任故人亦以非常之福禄祝之良非僭語也由是一語推之則其美周公而作益信矣秦風蒹葭説愚自幼讀此詩每覺其辭婉而有味似有託喻之意今毎諷詠但覺意味深長理在言外似有託喻如鶴鳴之類所謂伊人盖託言之非指言也如果為指言則既知其在水一方何不即溯游從之當漸至而必得何故先溯洄從之遇修阻而不可進而後溯游從之邪其上下逆順之間皆是託辭序說迂謬朱傳亦平解經文今姑作一解于後亦未敢以為必然願與同經者再商之詩人之意若曰蒹葭則蒼蒼然矣白露則為霜矣覽時物之變莫非氣化之流行而道亦無不在也然道無方體無定在又無形聲之可見聞也吾心之所求果何在乎譬則伊人亦在水之一方耳謂之一方則既知所止而有定向矣然求之之道固不可不多方以致其力也洄者水之旋轉衝激而亂流者也游者水之平盈蕩漾而順流者也溯洄則言逆流而上遡游則順流而下者也水之衝激而我乃逆流而進冝其逆且難也謂之阻則廹於險峻不可得而進謂之長則牽引歳月無時可至由是以求之道愈難愈逺矣道既難求心不敢廢徐而思之盖自有方焉於是去其逆而即其順就其易而捨其難順水流行遡游而下果見其所求者宛然在水之中甚明而可見也向也逆而取之則徒勞而無得今也順而求之則可見而甚明噫勞心以必求不如遜志而自得道在邇而求諸逺事在易而求諸難詩人其深有得於此義者歟秦地即西周舊都其民皆親受文王周公之教者周雖東遷而文王周公之澤未冺賢人之在下者豈無尊德樂道歌詠性情如此詩之作者乎簡兮第四章古人作詩興體多取義不可容易讀過如此章是也榛果屬可以供籩實資民生之用苓草屬可以備藥物救民之病患山則必有榛隰則必有苓此本然之理也山而無榛則不足以為山隰而無苓則不可謂之隰譬則上之為君下之為臣當必有德政養民之生濟人之患今吾之所接於耳目果能如是乎固不可得而知也安得不思西周之盛王而反覆歎詠之乎定之方中卒章為君之道富民莫重於農桑富國莫强於牧馬然必上能致勤則下始知勸農桑得所必至足民其心誠實而淵黙則畜牧自然繁息必至富國富民者富國之本富國者富民之效惟其心塞淵故能力於農桑之務而勤於民事乃其心塞淵之實也衡門君子素其位而行不願乎其外夫人之患惟不安分而多嗜欲則忮害貪求靡所不至喪德伐性由兹而興故君子之道思不出其位而已堂髙數仭榱題數尺君子非不欲也然非我之素有則横木為門聊以棲遲可也食前方丈羣羞庶品君子非惡之也然不可以苟求則泌水洋洋可以樂飢亦足矣惟處心之既安而不妄動則素貧賤河魴與鯉雖美吾不思而必食齊姜宋子雖貴吾不慕而必妻天下之物又豈有能動其中者乎出其東門有女如雲詩意相類孟子我得志弗為章與此詩意互相𤼵聖賢得志之時尚不肯為如此况隱居而處下位者乎小雅鹿鳴首章言初筵之時始作樂將幣帛以侑賔而所以娛賔之意在乎望嘉賔告我以大道二章言旅酬之禮旣行而又欲其遨遊以盡懽也然其所望於嘉賔者有不在言語之間而威儀動作可師可法所以示我者甚明德音孔昭盛德之著聞也視民不恌其德可以厚人倫敦風俗也君子是則是傚其德可以儀軌百僚也嘉賔有是德而設厚禮以饗之則燕非徒設矣三章言和樂且湛湛有過樂之義旣作樂承筐以侑賔矣又燕飲遨遊矣意猶未足又和樂且湛可謂過三爵矣然其所以過於樂者為娛嘉賔之心而嘉賔所以可娛樂者由其德可為師法也則雖於樂而不至於淫矣故古人之燕雖極其歡欣和悦之情而尊賢貴德之意未始不流行乎其間也四牡騑騑章使臣固當盡心於事君而亦未嘗忘其親也人之行莫大於忠孝二者固難以兼盡故為使者於服勞王事之時而思親之念終未免戚戚於懷也人之所以為人者以其有君臣父子之大倫也賢者處而居家則當盡為子之道而孝於事親出而從仕則當盡為臣之職而忠於事君然而切於甘㫖之奉者固無由宣力於王朝而有官守言責者亦未免闕於晨昬之禮故古之賢者毎以忠孝不得兩全為病而出使之臣常以不得養其父母為念也但人臣竭力於王事者禮之常也而不得養其親者理勢有所必至也奚敢以私恩而廢公義哉亦奚敢自以為勞而形於言哉惟先王能通天下之志以為人情不過乎此故於其來敘其情以勞之也臣子之於君父義不得兼繫而情實難於偏忘陟彼岵兮瞻望父兮陟彼屺兮瞻望母兮行役之人皆有是心也自言其愁苦則怨上之人慰勞而代之言則恱皇皇者華舜初即位闢四門明四目達四聦天子之大務未有先於廣聦明也蓋輿圖之廣非一人耳目所可及民生休戚非一人智識所周知故必遣使于四方所以宣德意廣聦明而防壅蔽之患也然必得其人然後可任其職得其人而待之之禮未至亦難以責其成旣得其人又待之以禮則為使者下以慰逺方徯望之情上以答人君付託之重思致其勤以副上下之望者自有不容己者矣王畿之外侯甸要荒之逺民俗之隆汚政事之媺惡皆吾君所欲聞而吾為使者所當竭力而徧於咨詢者也曠廢之未修聲教之未洽皆吾君一視同仁之所關而吾為使者所當盡心而博於訪問者也驅馳之際攬轡之頃當思使九重之上聞其所未聞閭閻之細逹其所未達又豈敢懷居而少暇息乎常棣第七章上言燕私之樂下言友愛之懽燕私之樂適可而止不至已甚如鼓瑟琴然尚有可比友愛之懽樂而又湛已過於樂不能遽釋無物可比湛有過樂之義抑詩言顚覆厥德荒湛于酒其義可見傳以久訓湛久過義亦相近常人之情溺於妻子之私愛而薄於骨肉之親多矣聖人之天性則異於是妻子之奉非不樂也閨門之内一己之私情欲之感無介乎容儀燕私之意不形乎動靜如琴瑟之作一唱一隨律吕之音一鳴一應奚敢溺而過焉過則失中矣至於兄弟之恩本同一氣幼則相聚長而浸踈一有㑹合之期安得不過於懽而豈容遽釋乎妻子好合而溺於愛焉則為過而失中矣兄弟旣翕不過於樂而遂已焉則為不及而失中矣聖人天下之中正其處此者莫非性情之正也此聖人為能盡其性而為人倫之至也此詩周公誅管蔡之後而作其志切其辭哀象欲殺舜舜見象而喜孟子言舜之心象憂亦憂象喜亦喜聖賢用心同一揆也行葦燕兄弟亦言其綢繆繾綣不能頓釋之意唐太宗既殺太子建成齊王元吉後生皇子燕羣臣酒酣語羣臣曰妻子可再得兄弟不可復得不覺泫然泣下古之聦明豪傑天性自與常人不同天保第五章此詩祝其君受福之辭不以福言福而以德為福不以德言德而以質實為德可謂知所本矣蓋浮華侈靡或以啟爭亂之原而質實無偽實能基阜安之治人君茅茨土階菲衣惡食躬行於上正欲導天下之人去奢而即儉禁偽以存誠也令夫斯民惟事乎耕田鑿井樂其日用之常含哺鼓腹於饑食渴飲夏葛冬裘之餘而無慕乎浮華侈靡之習奠居致力於稼穡樹藝居室場圃之業而無事乎虚妄譎詐之風是民皆能以君之心為己之心以己之德為君之德其日用所行眞足以稱君心之願欲如是則民物安阜於下人君端拱於上所謂多福又孰有加於此哉三代所尚殷尚質周尚文子曰周監於二代郁郁乎文哉今詩人不以文稱周民而以質言何哉周之文所以美者以有其質為之本也文滅其質又惡足稱乎論周之文當參考於此天保第四章吉謂諏士擇日天子宗廟之祭諸侯助祭其餘執事之人皆擇公卿大夫宗戚子弟之賢者為之宗廟之中以有事為榮不賢者不得與也旣諏士然後卜日卜吉而後有祭期卜而不吉猶未得以祭蠲謂齋戒滌濯祭期已定散齋七日屏腥葷格事務以修其外致齋三日思其居處思其笑語以一其内將齊其思慮以交於神明也祭之夕自堂徂基自羊徂牛鼐鼎及鼒視牲視濯告充告豐告潔饎謂酒食酒有清酒醴酒𤣥酒黄流食有犧牲粢盛籩豆庶羞吉蠲為饎實備于禴祠烝嘗之中孝享之誠乃獻於先公先王之上互文以並見爾雅頌言祭者多矣惟此詩備言四時之祭于先公先王豈四時之祫祭大享祧祔之主與常祭不同猶書言兹予大享于先王爾祖其從與享之類歟抑此乃祝福之詩非祭祀之詩故槩言祭則受福如是耳古人重祭祀受福皆本於神一章言福之多二章又言其極多三章言其盛大四章即言福本於神五章承四章之文言神錫以福不在於他只在民之質實卒章專言福日新相繼不窮之意王命南仲徃城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄觀大將之兵威固足以用武而克敵論王者之成筭初無待黷武而卻敵盖行師之道雖尚威武而馭戎之術要必以守邊為貴也王命南仲徃城于方國人之辭也天子命我城彼朔方南仲之辭也由國人觀之則軍之甚盛不可當自南仲論之則制戎之長䇿不可易堂堂之陣正正之旗以之出塞外渉沙漠以窮敵之巢穴此南仲之所得為而不屑為也務殺伐獻俘首而以開邊為功此南仲之所優為而不忍為也誠以戰而勝之不若不戰而屈人兵之為愈勝而㓕之孰若兵不血刄而戎患自息之為長此則明良之定䇿馭戎之要術出自王言而入乎南仲之耳受命於推轂之日而非他人所得與聞也始也觀其戎陣之整齊可謂無敵於天下終焉察其君相之成筭則兵不血刄而成功此王者之師所謂神武而不殺者歟宣王北伐詩曰薄伐玁狁至子太原文武吉甫萬邦為憲則不惟宣王能修文武之業吉甫亦能遵南仲之道者也傳曰或曰㐮駕也與懷山襄陵之義同言加之上也若訓為除恐與末章夷字義重若訓為駕想當時師向朔方之時亦必與玁狁相遇以大軍乗之不能當然後走遁于一時事理為宻若曰玁狁畏威逺遁未嘗接戰則末章所謂執訊獲醜義不得通杕杜陟彼北山言采其杞王事靡盬憂我父母此四句見於北山詩其辭同其義同杕杜為正雅北山為變雅何也杕杜之詩在上之人敘戍役之勞以閔之也北山之詩役者自言其勞而有怨懟之心也辭義雖同而苦樂之意異矣此其為正變之别也春日遲遲卉木萋萋倉庚喈喈采繁祈祈執訊獲醜薄言還歸赫赫南仲玁狁于夷覽時物之得所而樂之者由其心有眞樂故也夫惟中心有可樂之事而又適逢有可樂之景故不覺其樂之至極也苟心中本無可樂之事則雖有美景遇於前而接乎耳目者初與我不相渉也尚何可賦而樂之哉南仲城朔方以禦玁狁久戍而歸固可樂矣克敵而奏㨗畢事而成功尤可樂也其中心之眞樂已如此覽目前之景則春日暄妍卉木茂盛黄鳥和鳴蠶桑樂業無非可悦耳而娛目者而吾之執訊獲醜適當其時以吾心之至和而感時物之大和則凡物之各得其所者若有以賛吾悦樂之氣而不可勝言者矣斯樂也南仲之心所有也南仲有是樂而不自言而在上之人代之𤼵揚而歌以勞之則南仲之懽欣感激又當何如邪湛露二章言天澤濃而人君有成禮三章言天澤溥而諸侯有成德天澤之滋潤萬物猶君恩之慈惠諸侯詩人以湛露及豐草興夜飲成禮以湛露及杞棘興諸侯成德豐草杞棘本無用之棄材詩人之意若曰以豐草杞棘之賤而湛露皆有所及况我所燕之諸侯皆有令德可不加禮以饗之盖上天無心以成化而雨露之澤不擇物而周被聖人有心於制禮而燕饗之設必擇人而後行夫天之無不覆幬猶人君之無不統馭也天以髙明廣大之體覆冐于上而羣生庻類森然而麗于地者何莫而非承天之澤也人君以崇髙之極深居髙拱而五等邦君布列于五服之内者何莫而非䝉君之惠也雲行雨施品物流形而枝榦條葉洪纎甘苦莫不𤼵榮滋長以遂其生朝覲以時燕饗以禮而尊卑貴賤親踈一也卒章則極道其勞苦之情南有嘉魚篇中烝然二字若訓作𤼵語辭前二章可通末章烝然來思一句中有二語辭亦不可通式燕又思若訓思念來思亦不通當以烝然訓為衆思訓為語辭為是六月采芑六月北伐采芑南征六月辭意多警懼嚴愼采芑辭意多雍容誇張盖玁狁大素桀驁侵宼在五服之外荆蠻素服役暫背叛在五服之内二詩均為用兵其氣象大小難易亦少異於玁狁曰玁狁孔熾我是用急於荆蠻曰蠢爾蠻荆大邦為讎采芑卒章又曰征伐玁狁蠻荆來威意盖可見車攻五章六章當合為一章言器備而人心齊騎習而射御精斯可以即戎矣七章八章亦當合為一章獵罷而部伍閒息君之惠均及於衆事畢而威令整齊君之德誠出於衆田事息而君之欲不求備終事嚴而君之德無不備之子指當時御事之人允矣君子指宣王也㑹諸侯於東都播告天下孰不聞其號令所謂有問也既㑹諸侯車馬衆多田獵馳驟而不聞其喧譁所謂無聲也此皆由宣王威德所致故此詩毎章鋪陳實事末章歸美宣王立言之序如此車攻吉日雖皆田獵之詩車攻㑹諸侯于東都其禮大吉日専田獵不出西都畿内其事視車攻差小故二詩之辭其氣象大小詳略亦自不同猶六月采芑樂彼之園爰有樹檀其下維籜他山之石可以為錯物之美者或有疵物之惡者或有資窮理自修之君子當致其審也人惟理有未窮故所好者溺於愛而不知其中有疵惡者存焉於所惡一於拒絶而不知其中有可資者存焉是以好惡未當於理而已之德亦不能盡善矣園有樹檀人孰不知其為美材也而吾加察焉則見其下有籜落之冗積是檀可用而籜可棄亦猶人之才有所長亦有所短當取其長而舍其短可也他山之石孰不知其為棄材也而吾加察焉則見其猶可為錯資之磨礪以為利器用亦猶小人或有可用之才則亦當略其短而用其長也推是而充之則應事接物舉措取舍毫釐纎悉不謬矣小序云誨宣王也朱傳以為陳善納誨之辭亦本小序之説如此類皆有所傳不容少貶流水傳以此為憂亂之詩今詳終篇文意亦是畏讒之辭卒章言民之讒言變亂是非曽無有戒止之者是讒言見信誠可畏也故復告其友曰由今以徃我友凡一言一動可加敬慎矣讒譖之言上之人信之將有興起之勢若不敬愼則陷於譖人之口其可以不敬乎其者將然之辭與巷伯凡百君子敬而聽之之意同若如朱傳言我能敬讒言無自而興反似無懼之意恐與上下文意不相關屬白駒賢者之用世豈不欲得君以行其道哉盖必有以知國之將危而義有不可留者是以見幾而作不俟終日而在朝同心同德之儕惜其才而願其留故其辭如此非不知其志决而不可留也乃欲縶其馬以永朝夕非不知其潔己而輕富貴也乃欲其賁來而爵以公侯盖憂之深而留之切惟知伸己之情而不恤彼之志耳及其已去而不可即其繾綣之情瞻戀之意不能已己所留之賢者今不可考其才德聞望抑亦當時之俊乂歟作詩留之者豈若家父吉甫之徒與國同休戚義不可去者歟召公欲歸田而周公留之時有成王在上召公有可留之道也白駒之賢者决去而不可留盖上無明君道合則從不合則去君臣之正義也節彼南山有實其猗赫赫師尹不平謂何天方薦瘥喪亂𢎞多民言無嘉㦧莫懲嗟山必有草木草木山之實也無草木則為空其山矣亦猶大臣執國政者必當平其政以及民若不能平其政亦為空其位矣今觀南山之髙大則有草木之實猗猗然而茂盛而赫赫之師尹居于髙位乃不能平其政果何故而然邪上則得罪於天而喪亂荐至下則得罪於民而怨讟方興禍亂之形若此其著孰不恐懼而尹氏曽無懲創之意咨嗟之聲可謂空食天禄居髙位也始則舉其理之當然者以問之終則指其禍之顯然者以責之古人作詩字字有含蓄取義此章實字須如此説始見古人之意文理通貫下章承此章之意言不宜空我師空字與此章實字暗相應傳曰不信仁賢則國空虚盖仁賢在位則國充實姦邪執政則國空虚昔唐則天時狄仁傑卒后臨朝歎曰朝堂空矣女主之言亦有賢君識度者矣傳中皆言不平其心恐心字只作政字為切三章言小人執政不思職任之重是自輕其位不宜遂至空其國也四章言執政者既非其人則小人必以類進而政亂國危矣愛君憂國之詩人既指其失以責之復加勸勉之而欲改紀其政也五章承上章之言而終其意言汝既弗躬弗親而任弗問弗仕以欺天罔人是以致上天不均不惠而降凶災汝何不改紀其政必躬以親而勿用瑣瑣之姻婭乎汝若能改紀舊習躬親庶政則順于民而民心息矣若能平其政而罷去瑣瑣之小人則政修而怨怒消矣政修民和則天道順於上而凶戾亦消休徵至矣六章亦承上二章之意而言王與尹氏終不能改紀其政雖責之而無所懲諫之而不能從不弔昊天亂靡有定天變不息也式月斯生俾民不寧政亂益深也憂心如酲誰秉國成憂之甚而中心憤亂也不自為政卒勞百姓終不能改無所望之辭也七章言小人同而不和難事而易悦其喜怒不可測實難與之言也八章言小人不足與共事将引而去之而四方同歸于亂而卒莫之之也家父周之世臣與國同休戚無可去之義所謂駕四牡瞻四方者亦假此之辭耳非實有此心也九章十章言君身之不安由大臣之心有所蔽天下之未安由人君之心有未明夫生於其心𤼵於其政政之治亂何莫非由心之開塞家父作詩反覆致亂之由至於終篇乃歸於尹氏與王之心可謂知出治之本者矣正月謂山蓋卑第五章言是非變亂而不知戒賢否相諛而不能辯上下亦同歸於亂而已謂天蓋髙章言憂國者極畏愼而盡言當國者無忌憚而肆毒盖昬亂之朝蔽固已深未嘗不使人痛恨而長歎也九章十章言在載之車方渉危險之地乃棄其輔車則必墮其所載必整其輔車使完固周宻然後可以濟險不輸所載亦猶人君當艱危之時乃棄其大材之賢輔而用憸邪之小人則必失其負荷之重必無棄其舊臣使左右侍御皆稱其職庻可有濟而無失也此詩至八章所言危亡之形已成不可復救此二章復借驅車以明救亂之道惓惓然愛君憂國之誠有不忍恝然之意此詩之所以為厚也昔人有言將渉千里舍騏驥而䇿蹇驢可悲甚矣亦此詩之意也十月之交幽王内嬖襃姒外任皇父以致天變於上民怨於下故大夫作此詩朱傳於首章當脱此一句節南山言我瞻四方蹙蹙靡所騁十月之交言四方有羡我獨居憂何也盖京師者四國之本尹氏秉國之鈞而不能平其政則四方同歸於亂皇父不有其君而作都于向其辭意各有所指一則甚言尹氏之亂政本一則甚言皇父之營己私也蓼莪疑只作四章章八句小明疑只作四章章十二句大東說衰世虐政賦斂煩急凡所徴求毎出於常賦之外至於輸納之時典者復非理責備以難於人而民始困故民不忍指言貢賦之物而託於饋遺之微物而言我之所饋者酒也而西人視之曽不如漿我之所遺者鞙鞙佩璲也而西人視之曽不以為長夫酒之美於漿佩璲之甚長非不難見今乃斥美以為惡抑長以為短則非理而難人亦甚矣民不堪命無所控告仰天而訴之意謂若果如此則雖空其杼軸亦不足以塞逋慢之咎况民之力作有限而上之貪欲無窮以有限之力應無窮之求其將何堪維庶幾天之明監視之可也若織女之神靈敏速終日能成七㐮之幣帛然後可以紓吾之急耳故跂予望之然此亦無可奈何而託於虚空希兾之言耳非實有此事也故繼之曰織女雖有七襄之神速而無及於我牽牛亦不能服箱以遺我盖由跂織女而因及牽牛而并及金畢箕斗也衆星既無濟於我而我之窘廹略不少紓徐而視之則箕斗非惟無益而翕舌掲柄之形反若助西人之掊取者此則不敢斥言在上之暴虐而託諸天象以風刺其吞噬竭澤之勢情極哀而意則婉矣跂字恐當如跂予望之之跂引足以望髙逺之貌若訓隅字於星象為切於人情差緩傳曰㐮駕也謂更其肆也竊以為凡物有駕皆可謂之㐮故舁轝亦謂之奉㐮此章所謂襄義繫於此織機床之狀似之終日七襄言一日之間凡七落機甚言神速之意楚茨信南山甫田大田共四章四詩辭語典重禮儀盛備恐只是先王之事詩中言皇尸君婦使君壽考萬壽萬年等語王者言之則可施之公卿恐僭甫田卒章言報以介福萬壽無疆亦只是下祝上之辭農夫恐不冝施此語鼓鐘送尸乃奏肆夏此亦天子之禮樂春秋時列國有行此禮乃東周以後諸侯僭用非正也朱傳㫁然以為公卿有田禄者之詩盖以甫田歳取十千為一成之地為田九萬畆歳取萬畆之入即九一之法大田謂雨我公田遂及我私亦九一之法都鄙用助法八家同井乃公卿采邑之地天子畿内六鄉六遂用貢法十夫有溝與此制不同故朱傳之說如此今案舊說皆以為先王之詩朱傳引呂氏說言所以推明先王致力於民者盡則致力於神者詳依舊説與序説無異冝更詳之楚茨一章言前人有墾治之功故我今日䝉其澤得以收其利而享祀也二章言始祭迎神而禮儀速備也三章言助祭執事之人皆能敬於其事而神享之也四章言祼獻之後久而益敬故神之錫之亦各以類而應也五章言祭畢送神而親親之道尤篤而未已也卒章言神歸賔去之後同姓復燕於寢以厚其恩也詩人立言六章各有條序信彼南山維禹甸之畇畇原隰曽孫田之我疆我理南東其畆有前聖平成之功斯有後人修治之力不有前聖之功則後人之力無所承不有後人之力則前人之功無所繼大抵前聖整其大綱以遺後人故後人得以盡其條目之密也夫人繼前人之緒饗已成之業惟能思創始之勤勞撫盈成之匪易是以夙夜勉勉求不負前人之功苟或不知前人之艱難而視今日之成業為易得則怠心一萌百事廢而成業隳矣又何足稱乎楚茨自昔何為亦同此意古人用心忠厚凡事不敢忘本如此倬彼甫田歳取十千我取其陳食我農人自古有年今適南畆或耘或耔黍稷薿薿攸介攸止烝我髦士此章言取民以制而歛散各得其冝省耕以時而慰勞益重其禮以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊皷以御田祖以祈甘雨以介我稷黍以榖我士女備禮而事神旣以己然之利而歸德於民作樂而事神又以未然之利而恩厚於民蓋古人之於農事制禮作樂以奉方社田祖之祭其於歳時終始無一而不在於民也秋祭后土四方時農功已成故曰我田旣臧農夫之慶乃農事之終已然之利孟冬祭先嗇以祈求來年之榖故曰祈甘雨介稷黍榖士女又農事終而復始未然之利也有渰萋萋興雨祈祈雨我公田遂及我私彼有不穫穉此有不歛穧彼有遺秉此有滯穗伊寡婦之利天有餘澤而民好義地有餘利而民好仁夫仁義根於人心之固有無物不體無時不然要在人擴而充之耳未有義而後其君者也未有仁而虐無告者也今農民仰天之澤而其心先公後私則義不可勝用矣因地之利而其惠及於寡婦則仁不可勝用矣古之人致力於農畆之間而其用心若此非先王之教其孰能致之五經蠡測卷三
