body:
  text: 五經蠡測卷六明蔣悌生撰春秋孟子曰孔子曰知我者其惟春秋乎罪我者其惟春秋乎公羊子曰孔子曰其事則齊桓晉文其文則史其義則丘有罪焉爾孔子歷聘諸侯轍環天下本欲行道濟時及其老而時君終不能用也於是退而修詩書禮樂繫易作春秋以垂教萬世惟作春秋最居後非後春秋也蓋深有所不得已也子曰我欲載之空言不如見諸行事之深切著明也是故假魯史以寓王法遏人欲存天理使亂臣賊子禁其欲而不得肆綱紀法度粲然備具如有用我舉而措之亦猶是耳雖然無其位而託二百四十二年南面之權固有非得已者而魯乃夫子父母之國君子居是邦不非其大夫而況於父母之國乎春秋魯史莫非一時君相之所為加筆削於其間以示褒貶之意蓋立百王之大法為萬世慮至深逺不得不然爾聖人謙退之心恭慎之至冝其於此夔夔然栗栗然以為未免得罪於父母之邦常若有未安者故曰知我罪我其惟春秋又曰其義則丘有罪惟其心有不得已故惓惓出斯言也凡書法內外之辭不同例外君生書爵內稱公外君死書卒內稱薨弒則薨不地殺大夫則書刺書敗曰戰書取曰入出奔曰孫凡若此類所以為尊親者諱也至於惡有不可掩者則亦不沒其實以示來世然筆削之間多微辭而不為顯辭苟非遊夏之徒親受其義則後之學者又惡知聖人微意之所在哉春秋傳説同異自漢以來傳春秋者專門之學無慮數十百家汪洋渙汗使後學無所適從今觀公羊榖梁二子皆子夏門人去聖人未逺一再傳耳二傳之説尚有同異況漢儒以後講經者乎竊意春秋筆削之旨多微辭或直書其事因魯史之舊文而不加筆削者故有一句而兼數義者鄭伯克段于鄢之類是也有數句而共一義者單伯逆王姬築王姬之館于外王姬歸于齊齊王姬卒之類是也一時門人苟非升堂入室之徒恐夫子亦未嘗昌言輕以告之也非有隱也蓋記載之事莫非一時君相之所為其是非美惡實難指以示人也故春秋之作所以為萬世慮非為當時計也門人傳授明辨之時或有聞其一二義者又或聞其兼數義者所以一再傳之後未免有同異也禮記曰比事屬辭春秋教也噫比事屬辭又豈足以盡春秋之教乎夫子自言曰知我者其惟春秋乎罪我者其惟春秋乎固未嘗明言所以知我罪我之由又曰其義則丘竊取之矣亦未嘗指言竊取之義何謂至孟子乃曰春秋天子之事也春秋成而亂臣賊子懼春秋之義始明孟子之學出於曾思曽思親聞筆削之旨可見而春秋大義亦萃在此一語能通此義則二百四十二年筆削之旨思過半矣近世明經取士專用胡氏及三傳程子朱子亦以為然蓋取其議論正大若曰一一合乎筆削之初意則未敢必其然也大抵春秋之作不過欲正人心存天理明人倫正名分尊王賤伯內中國外夷狄雖聖人復生亦將有取於胡氏之言又何必一一盡合於筆削之初意乎滕子來朝舊説以為時王所黜胡氏不取以為使時王能黜諸侯春秋可以不作謂春秋討亂賊尤嚴於其黨桓弟弒兄臣弒君滕侯不能討反朝之故春秋貶其爵使同於夷狄是説固為正大愚嘗疑焉夫篡弒之賊魯桓也得以安享祿位傳諸後嗣不蒙貶罰滕侯以鄰疆小國以不應來朝之故乃受貶爵之罰是從賊之律反重於首惡又不惟加於其身遂使世世子孫以其先君一動之失不可復得其所受於先王舊封之爵恐春秋權衡不應若是失其輕重若曰時王能黜諸侯行其威令春秋可無作則時王之令但能施於𥚹小之滕而不能施於強大之齊楚此正季世之君威令不振繩其小不能繩其大東周之所以不復興也又何疑乎恐當以舊説為是然則無貶乎諸侯有邦交之禮世相朝滕侯曽朝於隱魯未嘗報今桓篡位而又先朝之直書而惡自見矣此乃聖人見諸行事之大目豈敢輕議更冀通麟經者相與潛體聖人之心熟訂之莊五年郳黎來來朝後始稱小邾子亦時王命之也晉曲沃武公滅晉王始命為晉侯詩無衣有明證時王猶能錫侯爵又豈不能黜侯爵乎但不能於大國耳子同生胡傳謂明與子之法正國家之本防配嫡奪正之原此説極正大若然十二公多有此乃常事不書何獨於桓公書子同生意者聖人必有微意在焉詩云展我甥兮説者云此詩人之微辭也愚恐聖人特書此豈亦詩人之微意乎更詳之案魯十二公惟莊公為嫡夫人之長子其十一公皆非嫡長諸侯一娶三媵生子魯史必具載今春秋惟小君得書餘皆削去生子惟子同生得書餘皆不載正所以防配嫡奪正之原舉此一條見他公嫡妾正孽不明嗣子不蚤定易世之時多致篡弒禍害不少此一條特一語耳而有數義明與子之法正國家之本此一義也顯辭也他公不書此獨書見他公皆有配嫡奪正之禍又一義也不書世子者未誓於天子也子同生在六年而文薑淫行猶在數年之後此又一義也皆微辭也顯辭具在筆削之中微辭多含言外之意顯辭可揭示以教人微辭苟非得於言意之表者固難斥言以告之也春秋書法若此類者非少舉此以推其餘耳又案成公母穆薑亦係嫡夫人之子成公生何以削而不書可見有微辭書法如此所以重國本甚薑行也但得其傳者蓋寡耳昔初學春秋先讀左氏胡氏己疑其意後見榖梁傳已有是説但注釋又失之粗陋耳夫人孫于齊夫人薑氏會齊侯于禚婦人內夫家無外事父母在則歸寧沒則使大夫寧於兄弟禮也出必告反必靣子道也故公出必書所往反必書至夫人例不書至以無所往也今案文薑如齊及享會齊侯凡七如莒凡二皆不書至孫于齊是懼罪出奔未幾歸魯魯史舊文必具載比之平居無事之時享會相如不同春秋亦削而不書以示見絶無歸國之義也出奔恥也來歸喜也季子以大夫不書出奔而書來歸文薑以小君書孫而不書來歸聖人善善惡惡之情見矣文九年夫人薑氏如齊夫人薑氏至自齊書至公及夫人薑氏會齊侯于陽榖僖十一年案僖公八年禘于太廟用致夫人去其姓氏以示非禮譏貶之意左氏以為致哀薑公羊以為致齊媵榖梁以為致成風皆非禮之正但此稱夫人薑氏前無經見此始見于經書法與文薑哀薑正嫡同略無貶辭恐公羊以致夫人為致齊媵為近是又案如鄭伯克段于鄢之類三傳及諸家説多大同小異若此類孔子沒而三傳即有同異奚待至漢而後有專門百家之異議乎意者外事多明辭可斥言其義以教人故傳説多同內事多微辭未嘗誦言以告故三傳即有同異不待坑焚之後也辛巳有事太廟仲遂卒于垂壬午猶繹萬入去籥仲遂殺嫡立庶親行弒逆惡莫大於是叔孫得臣副仲遂如齊不能救正其弒立之謀尚以不日卒示貶仲遂之卒略無貶辭反以猶繹譏失君臣之恩未詳其義齊仲孫來胡氏傳多祖榖梁説以其議論正大精密的有傳授也此一條榖梁以仲孫即慶父以其弒君如齊春秋惡之故加以齊絶之於魯其説甚巧然左氏紀載之書齊侯使仲孫來省魯難其來其歸有事實可考不誣此習於榖梁而未覩左氏所載故為臆説未免謬妄借使如榖梁説春秋惡慶父亦只書慶父至自齊不應魯大夫冠以齊號故胡氏不取如慶父出奔己書如齊歸魯削而不書聖人已絶之於魯矣此仲孫為齊大夫無疑凡天子諸侯卿大夫來必有所事或盟或聘或朝或求歸若無所事則譏其私交如祭伯是也又如州實介葛盧乃一國之君雖不書所事與來朝同若仲孫繫之齊為齊侯使之來不書省魯難若無故而來書法若此聖人之意若曰無故而來其心不可測而窺覬之惡著矣五經蠡測卷六
