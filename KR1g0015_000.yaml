body:
  text: 五經蠡測五經總義類提要臣等謹按五經蠡測六卷明蔣悌生撰悌字叔仁福寧州人洪武初以明經官訓導是書乃元季避兵藍田谷中所作嘉靖戊戌案原序內不題年號但稱戊戌以序中一百六十餘年語推之知為嘉靖十七年浮梁閔文振纂修州志始得稿於其裔孫宗雨序而刻之前有洪武庚戌悌生自序凡易一卷書一卷詩三卷春秋一卷後有文振附記曰右五經詩說獨多易書次之春秋為少禮記亡闕今猶題曰五經蠡測仍其舊也云云今觀其書或載經文或但標章句之目所說或大書或夾注體例絶不畫一蓋猶未成之藁草又尚書大甲篇首有曰詩書小序前已詳言之矣然以前絶未論詩書序則不但禮記散佚併尚書亦有佚脫也其說易多斟酌程傳本義之異同如解頤卦虎視耽耽其欲逐逐謂大臣之求賢為助如虎之求肉為食穿鑿太甚如解龍戰於野謂坤不得稱龍龍即乾卦六爻之龍隂盛而與之戰嫌於旡陽故稱龍以明陽未嘗旡則立義特為正大其說書於蔡沈集傳多所訂正解盤庚疑有錯簡三章未免因王柏謬說又加推廣至於髙宗肜日謂果為髙宗之事則當稱王不當首稱廟號用鄒氏音釋之說以為租庚祀髙宗亦不為無見其說詩謂小序因有紕繆而未子疾之太甚於諸篇同異務持兩家之平在元明之間可謂屹然獨立無依門傍户之私至其以鳲鳩為美周公乃豳風之詩錯簡入於曹風則又臆斷之餘習矣春秋僅說滕子來朝子同生夫人姜氏遜於齊夫人姜氏㑹齊侯於禚公及夫人㑹齊侯於陽谷齊仲孫來六條案遜於齊與㑹禚合為一條而仲孫一條與陽榖一條年月又復顛倒其說不甚主胡傳然既曰胡傳不合筆削之初意又曰聖人復生亦將有取於胡氏之言又何必一一盡合於筆削之初意則於胡傳亦尚在疑信間也大祗僻處窮山罕窺古籍於考據引證非其所長而覃精研思則往往有所心得名雖不及熊朋來書則實在朋來上也乾隆四十二年三月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀五經蠡測原序愚幼讀書略曉文義其或未通師友問辨既退猶有疑未釋者及壯至老其素所嘗疑輒尋經傳本㫖反覆參究旁托證據疑終未能解所恨窮居僻處孤陋寡聞不能訪求良師益友以質所疑每欲筆而志之以俟後之同志又恐獲僭議先儒之罪握筆屢投者有日今老矣輒復編而紀之名曰蠡測蓋以愚之膚識淺學而敢輕議先儒得失亦猶以蠡測海多見其不知量之意庶幾他日見者末減僭踰之罪并以平日讀書傳義之外已意管見作為衍說類附於後或者窮經有知我者於中取其一二焉亦以見愚之素心非敢妄為是言也洪武庚戌八月甲子後學蔣悌生仁叔序
