body:
  text: 五經蠡測卷二明蔣悌生撰尚書大禹謨后克艱厥后臣克艱厥臣政乃乂黎民敏德傳曰乃者難辭也敏速也亦易辭也言君臣能各勤其職而不敢有一毫忽易之心然後庶政可得而治至於下民觀感而化則上行下效表正影隨甚不難矣稽于衆舍己從人不虐無告不廢困窮心無己私而仁智兼盡惟聖者能之惟狃於己私故好自用而仁智鮮及惟聖人無我故能舍己之私見而從人之善言也鰥寡孤獨民之無告者撫之使得其養此仁之至困窮之士不能自拔者舉之使盡其才此智之盡堯舉舜于側微正不廢困窮之大目人心惟危道心惟微惟精惟一允執厥中理氣之稟出於天而殊分知行之學盡於己而同歸此聖學相傳之心法也人稟天地之氣以成形而有耳目鼻口之欲所謂人心也稟天地之理以為性而具仁義禮智之善所謂道心也人心感物斯生情肆益熾故危而不可持道心無形與聲不可見聞故微而不易求惟聖人先知先覺欲立教以示人使之察其微而使著制其危而就安也惟精者審察夫人心道心之所以異能擇之而不差故謂之精即大學所謂格物致知中庸所謂擇善明善孟子所謂盡心知性知之事也惟一者既知夫至理之所在則必力行以求至使人心聽命於道心而不二故謂之一即大學所謂誠意正心修身中庸所謂固執誠身孟子所謂存心養性行之事也中者無過不及之名知之至行之盡使人心發見之頃必使道心常為之主而不踰於本然之則即所謂執中也在大學則為止至善在中庸則為中在周子則謂之太極湯之建中武王之建極皆一理也堯舜禹湯文武周公孔子顔曽思孟道統之傳傳此而已大學所謂明明德明此而已中庸所謂修道之教修此而已論語開卷言學學此而已孟子開卷嚴義利之分正所以辨人心道心之源故朱子於四書篇首集注其旨大同小異實與此章相表裏讀者當融會而貫通之不可以差殊觀此章乃一書之樞紐蔡傳全用朱子中庸章句序訓釋乃朱子曽經訂正無餘藴矣今日課講義正不欲全蹈襲前人語必主其説而演繹發明之庶幾得融會貫通之趣云臯陶謨知人則哲能官人安民則惠黎民懷之有智仁之實斯有智仁之效仁且智聖人之德也然體備於己而用施於人惟實德之備於己者有兼至則效驗之著於人自有不可掩者知人謂之哲者智之至則其用之所施能舉天下之賢而任官使矣安民謂之惠者仁之至則其用之所及能入人心而不能忘矣哲也惠也智仁之實德也官人也民懷也智仁之效驗也二者兼盡帝堯猶難况其下乎亦行有九德亦言其人有德乃言曰載采采此言天下之言善者雖非一端而人之稱善者必考其實行此帝世取人之法也日宣三德夙夜浚明有家日嚴祇敬六德亮采有邦此言人才生於聖人之世既因其材而篤之則亦隨其材而用之也日宣日嚴祇敬因其材而篤之也浚明有家亮采有邦隨其材而用之也無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之此章言人君當正己以率下固慮夫事之萌於微者為可畏人君當盡心於求賢尤思夫職之原於天者不敢忽蓋人君一身所以表正萬邦而天下之事固宜廣求賢才以共治之也是故克勤克儉君當以身先之使諸侯有所則效不可怠惰放肆以導之所以然者蓋以一日二日之間事幾之來且至萬焉何可以不懼也若夫庶職之繁不能以獨治當旁求俊彥以共理之不可使野有遺賢而朝有曠職所以然者誠以百官庶事皆曰天職君臣皆代天理物者也一職或曠則獲戾於天矣其敢忽而不敬乎始之無教而制一己之私終之無曠而合天人之理人君正己用人之道於斯備矣益稷豫乘四載隨山刋木暨益奏庶鮮食豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食聖人於治水之初親執其勞而所以濟民急者既有其助聖人施治水之功能順其序而所以養民生者尤得其人蓋斯民之得遂其安養者皆由於聖人治水之功而一時同功共事之臣各有所長則於敘功之時初不沒其善也仲虺之誥式商受命用爽厥師蔡傳云爽明也言天使商受命用使昭明其衆庶也今詳上下文義恐不然只是指夏而言爽如不爽之爽差失之謂言天不善夏之所行故使商受命以代夏使失其衆也如此解與下文簡賢附勢文意相屬惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟己改過不吝克寬克仁彰信兆民此章言成湯之德性不偏好故賢能之任不混所施心無私繫故君德之及感人者深人惟牽於物欲之私故行事鮮能盡善惟聖人無私是以從政臨民莫不合於當然之則也聲色貨利常人所嗜好也湯則不邇不殖天性之不偏也賢者授之以官能者酬之以賞各適其宜也人之有善若己有之用之而不疑己之有過勇於自克改之而不憚心公而無私繫也寬仁君德之大端也寬則得衆仁則能愛人推此以及人民信而德顯矣蓋其心之不偏無我者出治之根本彰信於兆民者德政之效驗也惟其存於中者醇粹而無疵則見諸外者泛應而曲當有諸己者光輝而篤實則孚於人者顯著而周遍論聖人之德亦可謂備矣去讒逺色賤貨而貴德所以勸賢矜伐自用則賢能不為用民豈能信乎佑賢輔德顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌此章言王者於善善惡惡之科各因其自然之理而施之初非有意於其間也蓋賞罰者人主之大柄也好善而惡惡天下之同情也人君惟能舉措得義則人心服而大業由以盛矣賢德忠良之人在彼有可好之實故我從而佑輔顯遂之弱昧亂亡之人在彼有可惡之理故我從而兼攻取侮之聖人曷嘗有私好惡哉因其有可好可惡隨物應之乃自然之理也於己何與焉此人心之所以服邦國所由昌也賢者才德兼備德未必有才賢重於德也忠者盡心事君良者行己易直忠重於良也所謂由大以及小也弱者不能自振昧者不明於理亂者紀綱廢壞亡者逆天反常亂亡重於弱昧也所謂由小以及大也推者革而去之之謂固者殖而厚之之謂篇末言殖有禮即佑輔顯遂之事覆昏暴即兼攻取侮之事仲虺何屢言之蓋湯征自葛始其後韋顧既伐及昆吾夏桀十一征而有天下皆兼攻取侮也其餘五等邦君非黨惡者皆仍舊封湯皆撫而有之湯之慚正在於此故仲虺言此乃應天順人之事非己之私所以釋湯之慚湯誕告萬方凡我造邦一節即賢德忠良之諸侯仍舊封者湯復諭之戒其為不善勸其為善即仲虺之意也佑助也有加爵賞之意輔者扶植之顯者表其名遂者即其舊四字亦自有重輕王懋昭大德建中于民以義制事以禮制心此章言聖人明明德於天下而庶民同一歸極聖人能全天命之性而內外兼有所養也蓋禮義者人性之所同得惟聖人為能全之是以立中正以為民表而人心有同然者於是取則焉則會極歸極有不期然而然者矣德也中也義也禮也一理也自人性而言故曰禮義自其稟於天而得於己而言故謂之德以表立於此而四方取正而言故謂之中其實一理而已大學言明明德於天下者皆以修身為本而其要在於誠意正心舜執其兩端用其中於民而本諸身者曰由仁義行武王建其有極而民之會極歸極則曰遵王之道遵王之義誠以仁義禮智乃人性所固有但衆人汨於私欲而亡之聖人則能明其德而全之是以存心養性以立其大本窮理處事以達其大用立中正之表以為民準使之皆有所取正而無過不及之差所謂明德新民而止於至善者大舜湯武其揆一也顧諟天之明命日新又新懋昭大德也孟子曰湯執中即建中於民也以義制事義以方外也以禮制心敬以直內也由乎中以應乎外制於外所以養其中懋昭大德在是建中于民亦不外是矣湯誥天命弗僭賁若草木言天命不差賁然易見如草木然栽者培之傾者覆之皆因其自然之理而付之初無意用力也罪人黜伏傾者覆之也兆民允殖栽者培之也如此解似有理凡我造邦無從匪彞無即慆淫各守爾典以承天休此章乃成湯革命之後布維新之命以與天下更始亦不越乎懲勸二端而已無從匪彝無即慆淫懲其為惡各守爾典以承天休勸其為善典即彝也謂先王舊章也慆淫以情欲而言人能禁止其一己之私無慆淫之失則能守其典常而不從非常之舉矣造邦繫之我建侯之令自天子出守典繫之爾述職乃諸侯之常事太甲上詩書小序前已詳言之矣今案四代之書史氏紀載每篇首史臣已有本序典謨語簡重本序亦略提大綱篇中君臣問答語意自明白可尋如五子之歌伊訓篇首本序極詳悉何用小序贅出至太甲篇首言惟嗣王不惠于阿衡伊尹作書一假畢復更端又言王惟庸罔念聞伊尹乃言又一假畢又言王未克變及居桐悔悟篇終又言王徂桐宫居憂克終允德以終首篇之意而發次篇之言皆史氏之辭以貫紀載一篇之意既詳且明故曰書小序可以無此類可見後多倣此自周有終相亦惟終自周二字對嗣王看則自字分明指先王之身周如周于德之周完密而無罅隙之謂言夏之先王自省其身無罅隙之可議故能有始有終相亦蒙君之及亦能有終見得君重於相使太甲知自謹不可恃伊尹而縱欲如此語意自順不必引國語施氏之言王惟庸罔念聞庸訓用作六字一句為是先王昧爽丕顯坐以待旦旁求俊彥啓迪後人丕大顯明也詳文意只是言成湯急於求賢為子孫計故於未明以至於大明之時往往坐以待旦其所以勤勞不遑安寢者惟欲廣求賢俊以開導後人也如前篇敷求哲人俾輔於爾後嗣之意蓋先王圗治之道為後世慮固非一端然莫急于求賢如堯舜之仁不遍愛人急親賢也丕顯二字下無所繫若訓為洗濯澡雪大明其德恐語意不倫太甲三篇皆文從字順不應二字如此艱澀若虞機張往省括于度則釋欽厥止率乃祖攸行此數語專為發明止字之義止者必至於是而不遷之意即至善之所在也不可有毫髮之過亦不可有毫髮之不及過不及則非所止矣凡物莫不各有所當止之地如括之度射之止也君之仁臣之敬子之孝父之慈人之止也虞人之於射尚知審其括之合於度然後發矢況人君可不慎求其所止之地而後行乎蓋伊尹以虞人審射之的明人君敬身之要也省字喻欽字度字喻止字釋字喻行字欽者敬之至也欽厥止敬之於心率乃祖攸行見諸行事惟能敬求其所止然後見諸行事而無失欲其見諸行事而無失又莫若近法乃祖之所行為易守蓋乃祖之所行又皆得其所止而止之之事也豫弗狎于弗順詳文意及事理乃伊尹自言我不能狎習於不順義理之人是以有桐宫之舉此正可見伊尹有任底意思若依蔡傳所解則弗字下欠一使字所謂不順義理之人正指太甲也伊尹既訓之不惠於阿衡又作書訓之又庸罔念聞又訓之王未克變再三訓誨而不改故承上文而言豫弗狎于弗順文意明甚孟子集注正如此解太甲下與治同道罔不興與亂同事罔不亡治而謂之道者指理義之當行者而言如三綱五常天敘天秩禮樂制度之類皆是也亂而謂之事者指人情所作為者而言聲色犬馬賦斂威虐之類是也蔡傳損益二字莫若作因革則天敘天秩皆在其中咸有一德其難其慎惟和惟一其難其慎嚴之於未任之前惟和惟一信之於既任之後非難非慎則所任或非其人非和非一則賢者亦不肯為用其者不易決之辭惟者不可易之義孟子曰國君進賢如不得已此其難其慎之謂盤庚上盤庚遷于殷民不適有居率籲衆戚出矢言曰我王來既爰宅于茲重我民無盡劉不能胥匡以生卜稽曰其如台率者民相率也曰者民之誓言也我王民稱盤庚也此一節乃史臣述盤庚將遷殷民不從出怨懟之辭如此也言盤庚將遷都於殷民不肯往居相率號呼衆皆愁戚而出誓言曰自我王即位以來既定居於此矣方愛民非害民也今乃不能相正以生乃稽之於卜曰無如我民何此皆民之怨言其意若曰自始至今既安居久矣今乃無故信卜筮無根之言而造此非常之舉動寧不使我民流離轉徙以害其生乎先王有服恪謹天命茲猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈若顛木之有由蘖天其永我命于兹新邑紹復先王之大業底綏四方凡六十三字錯簡當在無傲從康之下盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸針王命衆悉至于庭此錯簡當在其如台之下承上文民有怨言盤庚乃出教令以諭衆令各從其在位之人以來勿以遷都為異常之事但以尋常舊日所行正法度之事視之可也蓋以舊日法度在下臣民必順上所行無在下各執私見之理大意謂今日之事各宜洗心滌慮盡其情實不可有先入之私見或有細民言有可悉毋得遏之使不得上逹議論詳悉則遷都利害必有至當不易之論故王命臣民衆庶悉至於庭以聽王之號令也此等語正是篇首發端語不應在底綏四方下王若曰格汝衆豫告汝訓汝猷黜乃心無傲從康此錯簡當在先王有服之上此以下乃盤庚誥臣民之辭黜乃心無傲從康乃一篇之大旨其下云云皆所以釋二句之意如蔡傳所解率籲衆戚出矢言作盤庚之言但此句繫於民不適有居之下作盤庚言恐語意不順我王作盤庚稱祖乙恐非嗣王稱先王之體既言先王有服至底綏四方許多告諭復言盤庚斆于民王若曰于下恐錯亂無序非誥臣民之體况王命衆悉至于庭然後告諭衆未至又告戒何人中篇首言誕告用亶其有衆咸造勿褻在王庭盤庚乃登進厥民正與上篇盤庚斆于民一節數語文勢相似乃史臣發端語錯簡明甚先王有服此一節大意言不遷都之害若顛木之有由蘖此一節言遷都之利古我先王亦惟圗任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚豫弗知乃所訟此一節言先王之時君令臣從同心一體今汝造為浮言不息起信傾危淺見之人以沮遷都之謀我不知汝之心有不平何謂乎訟者心不平也含德言其不盡情實包藏於心如上文伏小人之針匿厥指之類觀火視火之然也火始然則當撲滅之不可坐視其然至於燎原則不可救矣今我聞汝浮言不急治汝是我拙謀長汝之過亦猶坐視火之然而轉熾也汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非豫有咎言汝不諧叶善言於民是汝自生毒害自取敗禍姦宄于身導民為惡自承其痛雖悔何追小民之言有不從之者尚有口過况我為君能制汝死命汝何敢不稟命於我而輒造浮言以扇動民心乎汝之所為若此恐必至於陷溺其衆庶也若火之始然蚤當撲滅若至燎原則不可嚮其尚可撲滅乎喻浮言蚤當禁止若復縱至於沮謀害成則必加刑罰是汝自取之非我之過也邦之不臧惟豫一人有佚罰佚如淫佚之佚過也言邦之不臧皆由汝浮言之所致我必重罰汝也邦之臧惟汝衆申結用德彰厥善之意邦之不臧惟豫一人有佚罰申結用罪伐厥死之意所謂佚罰即伐死之義也故篇終復斷之曰罰及爾身弗可悔人惟求舊器非求舊維新盤庚引遲任之言意謂國有大事必求世臣大家與之謀者以其與國同休戚故也器非求舊惟新者舊則敝壞新則完固耿之圯亦猶器之舊遷于殷亦猶求新器也盤庚中罔不惟民之承承字有三義承載承奉承順人君一人在上庶民在下所以承載其君此以形勢言庶民出賦稅以供上用出力以供上役此以事言所以承奉其君上令下從風行草偃不敢有違此以理言所以承順其君此三義皆可通何必訓為敬下文承汝俾汝義同恐人倚乃身迂乃心言浮言之惑人能使陷於邪僻而不及於中正涉於迂逺而不切於事情茲豫有亂政同位亂政指具具玉造浮言之人不必訓作治字具即下篇總字之義盤庚下朕不肩好貨敢恭生生無總于貨寶生生自庸當時大家世族有田祿沃饒之利故安土重遷造為浮言以沮遷都之謀夫專一己之利必不恤於民生盤庚三篇大意在此中篇既以具乃貝玉與往哉生生折言之至終篇遂以好貨與生生對言而申言之以明遷都乃上下生生不窮之利不遷則世臣之利而小民之害也今案上篇乃盤庚始有遷都之謀世臣不利故造浮言以惑衆愚民無知怨咨蜂起不肯遷盤庚乃出教令大意皆責在位之人多示嚴刑以威之中篇則臣民已遵教令浮言已息遷都有期臨行告諭之辭大意皆諭民庶在位既從下民如風行草偃不必示以威惟慮塗中有寇攘竊發故特嚴刑以禁之下篇則既遷殷上下奠居勞事已過將享安業故統諭之皆撫綏之意上篇威多於恩中篇恩威並行下篇施威崇恩此盤庚三篇之殊義也又案篇內如不乃等語乃一時方言先儒謂周誥殷盤詰曲聱牙今觀周誥尤甚于殷盤蓋篇中語多是一時方言加以有錯簡脫誤是以難解未免以意逆志而後可通耳説命上説築傅巖之野築作版築之義為是王置諸其左右師其學也愚嘗曰髙宗之於傅説學焉而後臣之故不勞而治若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨三者皆資其輔益之義金作礪一器之小者望其朝夕有切磋琢磨之功使己德日修而至於成器濟川舟楫望其急難相濟則澤及乎人矣大旱作霖則澤及天下如天地之功用非人力所可及所謂一節深於一節者此也啓乃心沃朕心蔡傳厭飫二字莫若浹洽為佳若藥弗瞑眩期説之極言若跣弗視地勉己之慎行欽豫時命其惟有終此二句總結上文言能敬我所命之語則庶其為有終也説命中惟天聰明惟聖時憲惟臣欽若惟民從乂天言聰明不加一語天道無為不待贊也聖言時憲人君當法天行事與天為一不可異也臣言欽若當敬順其君之所為敬順其君即所以敬順乎天不敢忽也君之時憲臣之欽若皆非易事至於民之從乂則不勞而治矣此四句與大禹謨后克艱厥后臣克艱厥臣政乃乂黎民敏德四語大旨相同此雖不言克艱而君臣交相責難之意皆在其中矣自惟天聰明至事神則難乃傅説畫一以告髙宗也每句以惟之一語發其更端各主一事而言蔡傳分為九節今觀第一節槩言為君為臣之難第二節槩言人君賞善罰惡之要第三節槩言用君子棄小人之道此三節統言其大綱慮善以動之下枚舉其細目蓋亦莫非修己治人之良法黷於祭祀亦是舉一節而言蔡傳未辨髙宗肜日非髙宗之祭故以此為因其失而正之恐非是王忱不艱允協于先王成德言王誠能為信力行而不以為難則信合先王之成德若作亦不為難案下文頗不順髙宗彤日嘗觀祖己訓王之辭激切如許乃忠臣告昏主之言竊疑髙宗踐阼之始夢帝得説此乃歷古亘今罕有之事自非誠心與天無間何以得此蓋非凡主不應暮年昏耄如許又若為髙宗時事篇首但當稱王不當稱廟號則為嗣王之書無疑蓋祖庚彤祭髙宗之廟而有此異故祖已作書訓王也又案商王皆以十日干為王號獨中宗髙宗既以太戊武丁號又以宗稱蓋以宗稱者皆殁世之後定其諡號見其盛德大功非他王可比故以宗稱始為不祧之廟必無晚嵗失德之理周公作無逸以中宗髙宗與文王並稱其賢可見今見鄒氏音釋已如此説當從鄒説為是西伯戡黎祖伊恐奔告于王蔡傳謂自其邑奔走來告紂未審何所據竊疑臣朝君必有其節祖伊聞西伯戡黎知其必及殷故憂切之甚不暇待朝覲之時而直奔告於王耳不虞天性蔡傳謂民失常心也今案三句皆言天之棄紂未及言民民字恐未穩但曰心失揆度也猶上無道揆之意牧誓昏棄厥遺王父母弟不迪遺餘也蔡傳欠此三字洪範貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖恭從明聰睿謂之曰者五事各有本然之則不可以加損也肅乂哲謀聖謂之曰作德之成就猶賴進修之功也恭而作肅則動容貌斯逺暴慢矣從而作乂則事有條理而不亂矣明而作哲則知之至而於天下之理無所疑聰而作謀則慮之審而於天下之事無所謬此四德之用施於外者然也至於心之官則思專主於內思通乎微則其妙用神化不測有莫知其所以然者有以兼統四德非若貌言視聽之司各主一事而不能以相通內外交修大小兼養人道踐形之學至此備矣五皇極皇建其有極天地有自然之數聖人有當然之理天地有中數而不得聖人則中數無以行聖人有極理而不本於天則中數何以立因天地自然之數而建當然之極斯可以為法於天下矣天一地二天三地四天五地六天七地八天九地十天數五地數五此自然之數也數始於參天而兩地合參兩而成五又為天地自然之數也五行生成之序由天一生水至天五生土土黃色居中則五居中又天地自然之數也天五生土地十成之以五乘十則十五者又天地自然之數也洛書之數五居中而四正四隅九一三七二八六四皆因五以為十五此九疇之位以五居中而繫以皇極之疇亦猶易卦六爻以五為君位也天以太極之理默運於亭毒之表而隂陽五行寒暑迭運庶類繁殖品物流形聖人體天之道居中建極而四方五服庶民庶類咸有取正會極同歸一理而已八疇之目皇極無所不該八疇之事皇極無所不總凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極此言皇極之施於庶民者也人才之生於世大率有是三等皇極之施各因其材而篤之亦有三等康色好德最賢者也錫之福尊以爵也有猷有為有守皆有能者也念之者敘而用之也不協于極不罹于咎又其次庸才也受者收也收入於鄉黨之官而教以六行蓋皇極之道中也養不中才也養不才以是皇極無棄民也有是三品之才而皇極亦有三等之施各得其道是以此時之人皆得其皇極之歸矣末一句乃總結上文三節之義人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎此言皇極之施於在位者也此一節與上一節對言民有此三品人亦有此二品有能有為即上文有猷有為有守之人有才者也正人乃居官守正之人有德者即上文所謂好德者也不必作庶官之長説不協于極不罹于咎此一等庸人此一節不言者此等未習教之人言之於民則可言之在位則不容在位有此之人故略之也於有能有為言羞行昌邦正人言既富方榖互文以並見爾非能為不與富正人不昌邦也昌邦以事業言榖善也以德化言所包尤廣也時人斯其辜亦兼上二者而言但有才任事有德在位之人皆當優以祿使有所贍若使有仰事俯畜之憂則此等之人終陷於罪非謂正人必待富而後為善蓋忠信重祿所以勸士乃先王治天下之大經皇極之道當然不必謂中人以上皆可能上一節言皇極之於民舉善而教不能下一節言皇極之於人當用君子去小人王者治天下之大端亦不出此二事于其無好德汝雖錫之福其作汝用咎亦通結上章之意深言用小人之害所謂法外意也無虐煢獨而畏髙明此二句本在人之有能之上今詳文意疑當在此亦錯簡爾蓋通結上一節之義言皇極既以是道而待天下之民人則天下之民人莫不囿於皇極範圍之內而無有或遺者矣然期在於必行勿以小民易虐而茹柔則過於中勿以尊貴可畏而吐剛則不及於中若是則淫朋比德並作而皇極倚於一偏而不立矣惟威福之用執其中而不失然後天下民之去其偏陂好惡之私循其遵義遵道之正由乎坦坦蕩蕩之塗達夫公平正大之域舉一世咸歸于極而皇極之道成矣二句移在此所以承上二章而起下章之義凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王此皇極之成其效驗若此故居五疇之終光者道德之光華天子之光豈天下民庶所易近所可近者天子道德之光華也禮樂制度頒於四方遍於臣民巍然煥然有昭昭然在人心目而不可掩者莫非道德之光華也民生日用之間用其禮樂遵其法度雖謂之近天子之光可也積之之久民皆復其本然之善樂其日用之常有男女居室之安無疾疚憂患之危皡皡然熙熙然不覺歡欣鼓舞歌咏太平而親戴其上有不能自已者此王道之成皇極之極功咸有一德書曰俾萬姓咸曰大哉王言又曰一哉王心蓋治化之極恩德入人深自能致此堯民擊壤自是實事理勢必至惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒嘗觀九疇之目惟皇極一疇敷言詳悉蓋八疇之目皇極為綱其事無不該其用無不總不詳言而敷衍其理非一言所能盡也其他八疇但略言本疇之事不他及也如初一五行始言目次言性終言味止矣次二五事始言敘次言德終言用亦止矣次三八政次四五紀只言目不言用二疇之用易見不待言也次九福極只言目無他辭蓋其失得係極之建不建訓之行不行亦無他言也惟次七稽疑次八庶徵此二疇敷言頗詳然皆不離其本疇之旨如七稽疑始以擇人為先次言卜五占二之目又次言卜筮吉凶之用辭雖繁皆釋稽疑之旨八庶徴始言雨暘燠寒風五者之目次言時敘備無之吉凶又次言時恆休咎之微由乎五事之修不修又次言君臣之省驗辭雖繁亦皆釋庶徴之旨無緣此二節凡四十八字繫於剛克柔克之下蔡傳雖依本文平解然與上文意終不貫蔡傳又以威福豫奪抑揚進退釋剛柔之用蓋見經文有威福二字故以為解又見二字未能盡剛克柔克之義故復增六字以足其意借使可解然三德之目曰正直剛柔而已其用則平康得其一剛柔得其四下文若更演繹不應絶無正直剛柔等字而專論威福之當否歷觀九疇之經其言潔淨明暢易曉不應此二節上屬正直剛柔語晦而意逺若此又况平康正直乃聖人無為而治之本心而剛克柔克不得已而用之豈應下文敷衍舍去正直而專釋剛柔之用亦恐非箕子明疇之初意也愚昔讀此致疑而未喻近嵗反覆詳味蓋亦有年疑終未釋忽思莫非皇極之敷言而誤在此因詳此二節與上文正直剛柔之語不相蒙而與民無有淫朋人無有比德之語相類遂定以為錯簡當在惟皇作極之下凡厥庶民有猷之上今試以易置錯簡解之願與明是經者詳加訂正可也此承上文言民之所以無淫朋人之所以無比德者以惟皇作極之故也蓋威福乃人君御天下之大權極之建訓之行亦由人君能執威福之柄以號令天下受四方之供奉亦不為過凡此皆惟皇建極之所當為其權不可以下移其臣不得以上僭苟或有下移上僭之失則大而諸侯小而大夫皆致凶害為臣者側頗僻為民者僭忒皆有偏陂好惡之私不由平平蕩蕩之道而極不建訓不行矣側頗僻必至於淫朋僭忒尤甚於比德側頗僻僭忒五者凶德與下文偏頗好惡偏黨反側字相應害于而家凶于而國亦與下文而邦其昌好于而家語相應如此解庶幾字字明潔語意流暢文脈貫通視他疇經文語亦無乖異矣更詳之八庶徴曰雨曰暘曰燠曰寒曰風曰時此十五字當為一節言五者之來各得其時乃天地本然之氣候苟或一不得其時則人事之不修而天地之變也雨暘燠寒屬水火木金而風屬土者雨暘燠寒皆有風猶土寄旺於四時非若四者之不能以相通也五者來備各以其敘庶草蕃廡一極備凶一極無凶此五句當共作一節解言五者皆備各以時至亦不過多亦不過少則人事修天道得其常故庶草蕃廡休徴所致吉或一過多一過少則人事不修天道失其常咎徴所致凶庶草蕃廡植類皆茂盛百榖亦在其中此言天地本然之氣候天地無心而成化不擇物而滋潤故泛言庶草蕃廡後言王卿士師尹省驗始及民事為急故專言百穀此槩言天道常變後乃詳言五事休咎之徴而後及省驗而天人感應之道備矣庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨蔡傳備矣更加一節云星雖有風雨之異好而不能以自致必待月從之而後得遂其所好焉民雖有異欲亦不能以自致必待上之人仁政有以及之而後得以遂其欲焉然則為民父母者固當思民之好惡為之趨利避害以慰其傒望之情可也如此其義方足今案禹治水功成洛龜呈瑞禹列為九疇箕子傳禹之學以授武王耳九疇者帝王治天下之大法列為九以示後世然後為帝王之明範唐虞以來典籍具備可歷舉也六府允治五行敘矣精一執中五事至矣百工惟時八政修矣歷象璿璣五紀協矣戒董勸歌三德乂矣鬼神其依龜筮從矣地平天成庶徴時矣九德四罪福極分矣九疇順敘皇極建矣旅獒德盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力德盛則自然無狎侮之事有狎侮皆由德未盛故也下文不矜細行終纍大德意正如此君子言盡心小人言盡力各以其分言也不役耳目百度惟貞玩人喪德玩物喪志不役於耳目之欲以庶邦惟正之供德之盛也德盛則自不玩物又豈有狎侮之失玩物則珍禽奇獸之屬此篇本為玩物而作然玩物必至於輕人故以玩人狎侮並言蓋防微杜漸之意喪志者言趨向卑下為物欲所陷溺也喪德者言素有諸己者或因是而失也志以道寧言以道接慎德二字為旅獒一篇之綱領此二語又為慎德之綱領此言內外交養之學惟一於理而已靜而養其中循夫理而不危動而應乎外審諸理而不謬聖賢傳授之學不越是二者而已志以道寧者存養之功所以立天下之大本道之體也言以道接者省察之要所以行天下之達道道之用也此承上文志字而言遂及存心養性之事金縢豫仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神周公勞而不伐謙莫如周公此對三王在天之神自伐如此何也家國事重一時愛兄之心勝矜伐謙抑所不暇計抑此類乃聖人惟德動天處未可以輕易議之我之弗辟我無以告我先王辟字訓釋有二義遂為今古諸儒不決之訟今案朱子手書與仲默一假議從避居東都之説手書的非説傳蔡傳訓解皆用手書中語從鄭氏説至詩傳釋鴟梟詩又不從鄭説則朱子於此尚未決况在諸儒今以書文考之言居東二年又似有避居之事下言罪人斯得又似致辟而得其渠魁又蔡仲之命本序云惟周公位冡宰正百工羣叔流言乃致辟于管叔囚蔡叔降霍叔則分明流言之後即有致辟之事蔡傳言流言後周公避居東為詩貽王成王既悟迎周公歸三叔懼挾武庚以叛周公始請命成王東征往還又自三年此乃蔡傳臆説以文避居之旨考之經文殊不然也又以詩考之狼跋言公孫碩膚赤舄几几又似有避居之事觀鴟梟之詩其志切其情哀多是已誅管蔡後作史傳紀載既不可考詩書之文只如此未免諸儒議論不決然以一時事理推之恐致辟之説為長避居之説恐不然也何也由湯至於武丁賢聖之君六七作商德之在人心舊矣一旦殷民苦紂之虐懷周之仁故殷亡而周興然革命之後殷民洶洶未已向微周公繼之未易靖也武王崩成王幼周公位冡宰正百工雖未踐天子之位而實攝行天子之事三叔流言語侵成王周公此誠家國重事周公不即遏絶禍萌而乃避嫌疑退居散地萬一三叔乘殷民之未靖挾武庚以叛設或張皇則天下安危之寄寧忍優遊坐視而託之他人乎恐一時事理亦有不然者為避居之説者議曰三叔方流言周公豈宜遽興兵以誅之成王方疑周公若請命成王未必見從若不請而自行亦非所以為周公矣此等議論在君臣兄弟之大倫而言則甚正大若以一時事理而推則有不待辨者何也成王幼天下安危之寄皆繫於周公周公亦以身任之而不疑上自成王下有公卿百執事惟周公之言是訓是行凡國家所繫輕重緩急有當行者則必請命於成王而成王必見從豈有違拂之理况流言之禍所繫尤重周公尤不當有所避嫌而次且也若伊尹之於太甲百官總己以聽於冢宰則伊尹亦攝行天子之事也再三訓太甲而未變則曰豫弗狎于弗順營桐宫而置太甲非放而何或者亦議曰桐宫既營而太甲不肯行則伊尹當若何此亦與議周公致辟管叔請命成王未必見從之意同殊未合一時事理也蓋太甲成王之時天下之大權皆屬伊周使伊周之心欲行莽操之行則豈太甲成王之所能制惟其所行之事以迹而論似若擅天子之權以心而推正所以忠愛太甲成王之至此乃聖人之所為避嫌有不足論者不知此何以為伊周謂之任也且如放太甲誅管蔡伊周今日盡其在己之誠而行之及至事寧之後還政復辟之時伊周不害其為師傅之尊而君臣大節凜然無一毫玷缺亦何嫌之足避何疑之可釋哉又如武王克商牧野之師一朝而清明周公舉六師之衆掃除區區之武庚何至二年乃罪人斯得蓋發難之原事由三叔周公舉兵東征亦惟鎮靖東土以安反仄為急至於武庚新造之邦豈有拒敵之理又况事連三叔乃人倫之變實周室之不幸固不容逼之以兵直以文告之辭訊問情實名為伐叛實則鞠囚緩而不逼務在得實然後加刑當時事體自合如此是以動涉年月然後隨其罪之輕重以致罰殺武庚辟管叔囚蔡叔降霍叔不僭不濫罪及四人而已所謂二年亦舉大約而言見東征在是年而罪人斯得則明年事也若是則東征之時謂之居東自是實語及罪已定而周公痛心於管蔡之刑而慚德之懷戚戚然終未能恝然遽釋於衷於是作詩以貽王以述其悲痛之情王亦未敢誚公誚讓也人有不足於其人之所為輒以語侵之謂之讓詳味此一語可見武王崩成王立周公為人小心慎密勤勞王家成王敬事周公惟其言是訓是行曷敢有違但管蔡之誅周公之身正涉嫌疑之地成王之資困而知之者也未免有芥蒂之疑然至貽詩之時終不敢形於辭色而誚公也以此推之可見東征必請命於王王必見從無疑也及至感風雷之變啓金縢之書成王始大感悟昌言責已而昔日纎芥之嫌固有不足論者書文始末若此語脈自可推尋愚故曰辟字作致辟説於一時事理為長者此也雖然辟字雖主致辟之説而朱子與仲默手書一假議論實光明正大之論乃天地常經君臣大義所以存天下之大防杜萬世之口實自當為一編不可廢也嘗觀蜀先主臨終謂諸葛孔明曰君才十倍曹丕必能興復漢室嗣子可輔則輔之如不可公宜自取孔明泣曰臣竭股肱之力加之以忠貞如濟陛下之德也如不濟請以死繼之先主呼子禪拜床下命之曰我死爾事丞相如事我也先主既沒國事一聽孔明總裁後主畫可而已然而君臣體統朝廷法制不敢有毫髮僭踰漢業之興得尺得寸皆歸之君孔明何私焉竊意太甲成王時伊尹周公行事亦是如此劉禪暗弱不足言孔明之心實無愧於伊尹周公蓋善學伊尹周公而肖焉者也又若劉備亦不過一時之雄耳臨終尚能戒其子令事丞相如事我况武王聖人為後世慮至深逺豈無一言戒成王使之服周公之訓乎蓋必有之而紀傳不及載耳故論周公東征請命成王未必見從之説與當時事理不合也書之為經大要講明堯舜禹湯文武周公相傳之道大要論二帝三王之心此雖一字之義繫周公之心固不得不詳辨孟子曰周公使管叔監殷管叔以殷叛則流言之禍起自管叔蔡霍亦由扇惑而從耳周公致辟管叔于商與蔡霍不同想東征時皆拱手待問未嘗有阻兵拒敵之理大誥己豫惟小子己豫惟等語多是方言敷賁賁讀如焚音與用宏兹賁之義同亦通豫不敢閉于天降威用閉者塞而不行之謂以于敉寧武圗功寧武只是指武王而言文意亦順篇中多用此等語越豫小子考翼不可征此句中必有脫文誤字允蠢鰥寡哀哉言武庚信為無知蠢動但我民之鰥寡則深可哀也天棐忱辭言天之所輔在乎誠信有辭不必引民獻十夫為首稱嗚呼肆哉此等語甚不可曉想亦是方言朱子以故今釋肆字施於此亦略可通蓋歎息言所以我今日如此誥諭也若如蔡傳作舒放不畏縮于文意更艱澀惟大艱人誕鄰胥伐于厥室鄰相與為朋之意言武庚三叔相與為姦相攻伐於室中也案此篇蔡傳凡四節用四國二字恐皆未穩信四國蠢動此四國宜易為武庚四國勤毖我民此四國字宜刪只依經文天亦惟用平解友以喻四國此四國宜易為武庚三叔首大艱之四國亦宜易武庚三叔王若曰猷大誥微子之命二篇首皆同蔡傳以為發語詞但猷字乃係實字應有訓釋難謂語辭如今人尊長呼卑幼與之言未及本事每以但凡道理為首稱想猷字之義亦與此相近亦方言也康誥我西土惟時怙冒蔡傳言至罄西土之人怙之如父冒之如天至罄二字莫若易至盡天畏棐忱民情大可見言天命可畏惟輔誠信驗之民情可見民情歸則天輔之民情不服則不輔之此二句一意小人難保又是更端語惟𢎞王應保殷民保殷民者王之意我之應亦能保殷民則能廣王德意矣又曰劓刵人又曰二字疑衍文要囚服念五六日至于旬時丕蔽要囚要字蔡傳如字謂獄辭之要陸氏作平聲謂拘繫死囚二音雖不同大抵皆是重囚凡決重囚自五六日至于一旬又自一旬至于一時不敢即決者蓋以斷者不可復續死者不可復生故必加詳審恐差失誤人命也後世死囚必三申五覆然後結正古人旬時之意蔡傳言為囚求生道語未融有敘時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂言為政之道上令下從感應之機自有倫序上之人能明刑服人心則民亦相戒而勉於和矣去惡之心如去疾則民亦逺惡而不為矣愛民之心如愛子則民亦安於為善而易治矣此三者即有序之目也己汝惟小子未其有若汝封之心朕心朕德惟乃知己汝惟前已屢言即是方言不必再解詳此三言想是康叔乃沉潛慎密之人故武王以是稱之矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彞大泯亂曰乃其速由文王作罰刑茲無赦所以正民彞不率大戛矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由茲義率殺所以正王度紂俗之惡大端不過此二者在所先禁也亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則豫一人以懌王曰封爽惟民迪吉康我時其惟殷先哲王德用康乂民作求矧今民罔迪不適不迪則罔政在厥邦凡三節皆承上二節言治民之不善當先責在己之善敬忌即敬畏也今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天此一節當有闕誤酒誥克羞耉惟君克羞饋祀鄒氏辨蔡傳訓説近是又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之此言殷之諸臣亦有任舊職任事者惟工者見任事惟湎于酒然猶勞於事但未能遽革舊習未能絶去己私之嗜好雖或私竊飲酒非是故意慢法故不殺之且教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺此蓋一等之人有無故而在此張筵設席明用燕享之禮不從我之教令不畏我之刑威不潔治爾之職事此乃故意慢法者故殺之亦怙終賊刑之意飲酒一也或教或殺者事同而情不同故也武王於篇終舉此二條誥康叔其義大矣蔡傳解意晦恐不通洛誥我二人共貞貞正也我二人共守此正道敬天之休即貞也公勿替刑刑法也儀刑之謂公棄去則人失其儀刑矣公勿替刑則四方其世享矣多士我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰詳觀書中如商書引有夏事周書言夏商事引古昔興亡之由以誥當時多是先言先后能順天道故天命之後王弗率故天棄之此篇誥多士方舉有夏之事以諭之不應捨夏先后之有道而不言便説桀之不道詳經文意上二句乃言夏之先后有道而安寧如上帝引而置於安逸之地故天眷顧順向而不背棄及後王不能繼承先王之道不往求安逸不法天行不用帝命惟縱淫泆故天亦罔念聞廢其大命而降致罰也弗克上疑有脫字如後嗣王之類蔡傳引吕刑降格為證文意亦不類詩書中凡言降格皆是上天眷顧其德故來歆之若言天厭棄之則言降災降威降虐降喪不謂降格如吕刑言罔有降格正謂一時專媚於鬼神故絶地天通以格去鬼神歆享之説與此文意不類君奭今在豫小子旦若遊大川豫往暨汝奭其濟小子同未在位誕無我責收罔朂不及耉造德不降我則鳴鳥不聞矧曰其有能格此章上小子既是周公自稱下小子不應又指成王詳文意皆周公自稱收録用也言當今濟時之艱皆在我二人其任大責重如此我若未為國家所用與未在位之人同則雖大事不能責及於我今我二人既為國家收用而在位乃不勉其所不及則責及於我矣爾若棄去則老成之行膏澤不下於民靈瑞之應不可得而復聞况望其能感格於天乎時舉鳴鳯者成王曽遊卷阿鳯鳥鳴於髙岡乃召公繼成王之歌而作卷阿之詩想當時此事人尤以召公為首稱故周公於此特言之亦以歆動召公之心而敕勉之耳豫不允惟若茲誥豫惟曰襄我二人襄字蔡傳不釋當與贊襄之意同言余曰贊襄之力惟我二人而已成字未穩不允不惠猶言不顯不時之類言我既不信於汝而若此誥乎豈不順於此而若此多誥乎朱子詩傳言古人聲心而然案周誥諸篇多用方言又多闕誤故多有不可解雖傳依文解終是牽強處多此篇尤甚蓋此篇乃周公留召公之辭周公之言本是質而深况此乃是二人覿面無人之頃肺腑中流出方言尤多如天夀平格割申勸朂偶王等語縱牽解亦不通蔡仲之命懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民言當勉立其功以外則盡邦交之禮以上則致忠君之心以內則軿睦親族以下則安養小民言小民鰥寡無告發政施仁所當先也懋績者四事之綱四事懋績之目也率自中無作聰明亂舊章詳乃視聽罔以側言改厥度上章教以經邦為政之方此則告以修身處事之要言但當循天理而行勿肆己私而敗已成之法制審物則而動勿惑於邪而失本然之裁制人受天地之中以生所謂命也不偏不倚無過不及率自中即中庸率性之謂道乃人事之當然也度者吾心之裁制所以量度事物之長短而合其宜即所謂中也視思明非禮則勿視聽思聰非禮則勿聽此本然之則亦中而已先王舊章中之著也人能審其視聽不失其本然之則則邪僻之言無自入合於度而協於中苟或作聰明則小智自私邪言易入失度而過中先王之法亂矣上一截是存諸中而應乎外下一截是制於外所以養其中召公告武王志以道寧言以道接意亦相類然彼乃學而知此則困而知者此乃聖賢人已交修內外兼養之學而蔡仲亦與聞之亦可謂賢矣多方惟帝降格于夏詳此句亦謂夏之先后有道故天降格之及至後王縱逸淫昏不道始為天所棄爾蔡氏謂此上當有闕文意亦如此不克開于民之麗至于百為大不克開不克開者閉塞而不通也立政休茲知恤鮮哉恤憂也知恤亦兼人己而言人君當憂不得其人居其任者當憂不能盡其職籲俊尊上帝籲呼也凡書中言籲字皆訓為呼此章蔡傳以求賢釋籲俊蓋人君切於求賢念茲在茲名言茲在茲口不絶聲於求賢故曰籲俊周公之辭簡而深此類是也迪知忱恂于九德之行乃敢告教厥后蔡傳言夏之臣蹈知誠信于九德之行乃敢告教其君此所謂臣乃當國大臣位冢宰正百工者非庶臣也如伊尹于太甲周公于成王所謂告教厥后雖指有夏大臣乃是周公所行實事宅乃事宅乃牧宅乃準宅居也安也如人之安宅之宅居其位者德稱其職無纎毫罅隙之可議則安居而不危故謂之宅苟德有不稱則職有曠廢而不安矣古人用字簡深若此嚴惟丕式克用三宅三俊嚴惟者其難其慎之謂簡擇於未用之前既用之必使為政於天下丕式者信任於使用之後亦越文王武王克知三有宅心灼見三有俊心宅俊皆以心言恐無優劣深淺宅言克知俊言灼見互文以並見爾文王惟克厥宅心乃克立茲常事司牧人以克俊有德人即準人也言文王惟能克知三宅之心故能立此常任常伯準人之官又以其能灼見三俊之心亦皆有德之士足以居三宅之位者此乃申結上文克知三宅灼見三俊之義上文又言立政任人準夫牧作三事牧只一字指一事與此言常事司牧人文法正相似古人立言理義無不足而辭語或參差不齊若蔡傳説人字遂為衍文況準人之職守一代之法以為四方標準又容可略乎文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違舉牧夫而不及常事準人者言有司則三事皆在其中矣繼自今我其立政立事準人牧夫我其克灼知厥若若者順於理也三宅克即宅三俊克即俊德稱其職為順不稱則逆於理此以克灼知參錯並言可見上文克知灼見乃並言而互見爾和我庶獄庶慎時則勿有間之文王罔攸兼罔敢知者無使君行臣職也時則勿有間之者無使小人二君子也以覲文王之耿光以揚武王之大烈文王言耿光武王言大烈以人所易見而言蔡傳分屬德業謂各於其盛者稱之程子曰聖人亦無不盛繼自今後王立政其惟克用常人案此篇首言常伯常任準人其後言雖參錯不齊不過三事為急先務三宅三俊以位言克即宅克即俊以德言下文言三事實德每變文不同曰克俊有德曰義德容德曰厥若曰成德之彥曰吉士名雖不同其為實德則一也至篇終乃曰惟克用常人反若居三事之位者其才德無以甚異於人非有出類拔萃之才驚世駭俗之智者然後知聖人用人正用常德之人而作聰明以賢智先人者皆聖人所不取也君陳爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德葛氏曰成王殆失斯言欲其臣善則稱君或曰成王舉君陳前日已陳之善以美之殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中詳此章成王之告君陳有交相責難之意則上章所言欲其臣善則稱君恐非本旨只作舉君陳已行之事為是爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大此四句當共作一節承接只一意忍者懲忿窒欲之謂故訓為含忍言應事接物之時亦有當且含蓄容納不宜便形諸聲色傷於急切亦恐誤事有容德乃大此五字只宜作一句此容德與前篇容德同義秦誓言一個臣其心休休其如有容此等人正所謂容德者最為盛德忍與容只是一事皆接物和而不迫之意但忍出於有意容德則本乎自然忿疾於頑求備一夫乃不能懲忿窒欲之故此言人有甚愚而未化者亦宜寬以待之若不勝己之忿而疾之太甚則或能致亂人之任使當隨其才器而用之不可責備於一夫若責備於一人則無可任之人而職有曠廢若此者皆不能忍故言凡事必有容忍然後有濟又等而上之若有含𢎞寬裕之德則功業之效尤極昌盛不但隨事有濟而已康王之誥張皇六師無壞我髙祖寡命蔡傳後世忘祖父之讐口不言兵數語為宋南渡後君臣而發則亦有熊羆之士不二心之臣保乂王家此康王始誥羣臣諸侯以熊羆之士為首稱視湯武大誥天下語大有徑庭矣畢命樹之風聲此兼上下文表宅里殊井疆而言欲使逺人聞彰善疸惡之法以廣懲勸之道也政貴有恆辭尚體要常而可久之謂恆政有恆則民信而易遵守屢更改則民疑而無所措質實之謂體切直之謂要凡上人出令惟欲下民知上之意而從之辭令質實而不文切直而不泛則民易從而事亦可行若繁文無實則所令反其所好而民不從矣厭常喜新謂之好異商俗靡靡以利口為賢正厭常喜新之弊辭失體要而政不恆所以民叛之可不念哉雖收放心間之惟艱言今治殷土之道雖曰但使之收其放心似若不難而其實則防間之猶甚難也資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓資富能訓既富而教則必無驕而好禮由乎德義監于古訓無怙侈滅義驕淫矜誇之失安享所有不干刑憲而桎梏死者資富能訓教之序也惟德惟義教之實也由于古訓教之式也君牙𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中式用也不必訓為敬言天生蒸民有物必有則乃民生固有之常性非取諸外而附益之惟其氣質之偏物欲之蔽故失其中正而陷於一偏所以大布五典之教亦惟以和其民本然之則而已謂之𢎞敷者無有一民或出于五教之外者謂之式和者但使之不乖其本然之性而已初非有所勉強也教民者先覺覺後覺因其固有而導之耳正則無邪僻中則無偏倚正言身五典之行著於外發皆中節道之用也中言心五典之理存於內未發之初道之體也中正則合乎民則而無不和矣蔡傳見舜命契言敬敷五教故以敬訓式正不必然冏命僕臣諛厥后自聖孔子曰一言可以喪邦曰惟其言而莫豫違子思言於衛侯曰君之政事日已非矣君出言自以為是而臣下同聲賢之詩曰具曰豫聖誰知烏之雌雄抑亦似君之君臣乎然則僕臣諛厥后自聖所繫為甚重故此特言之非人其吉惟貨其吉若時瘝厥官瘝病也任人不以德而以貨則為不得其平而病其職矣吕刑皇帝清問下民鰥寡有辭于苖鰥寡讀屬上句於文理差順穆穆在上明明在下灼于四方罔不惟德之勤故乃明于刑之中率乂于民棐彞穆穆者天子之容明明者羣臣之德人君端拱無為人惟見其容故曰穆穆在上羣臣分治庶職辨析明察故曰明明在下君臣之德著于四方亦惟務以德化民而已及不得已而用刑則亦惟明夫中道而治民以輔其常性而已罔不惟德之勤蔡傳作民觀感為善説恐費力典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天德擇選也忌畏也擇言當作絶句在身屬下句言刑獄至重必得剛明之才不畏強禦不貪賄賂故其法不惟得盡用於勢家亦得盡用於富人刑獄乃民命所繫不可不敬又不可不畏忌亦極畏之意惟其敬畏之至則必詳察獄情求至當之理為一定之論其言不可選擇如可選擇則有二議用法者將有推移受刑者將生希覬非典獄之善矣惟其無擇言則己身能純乎天德謂之天德者天命天討皆有一定之理曷常可擇此一節所稱之人非伯夷臯陶不足以當之蔡傳解罔有擇言在身處不甚明白罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑此一章當分為三節皆申言上文告有邦有土之語言罰以示懲雖或免死然財乃民命出金之痛亦己甚病口辨之人若使斷獄其於人之是非曲直雖若辨析然未必得民情之實溫良忠厚之人使之斷獄雖或寡言然必能得民之實情不用佞而用良則刑無過不及之差矣此一節申明何擇非人之意差等也民之辭有等而法律亦有等察其辭而監於等有犯是罪而不當從是律者有犯是罪而當從是律者情實異不等故也故必哀敬以斷之哀者惻隱不可強暴敬者重慎不可輕忽蓋斷者不可復續死者不可復生可不哀敬而用刑乎又必明開法律之文而與衆共謀度之哀敬者盡吾心之仁明啓胥占者資衆人之見能如此則庶幾皆無過不及之失至於案律罰金之時尤加審克此一節申明何敬非刑之意獄成者案已具也輸者犯人自吐其情欵也獄已具用刑之人皆信其刑罰當而無失受刑之人亦信其刑罰當而無憾上備猶加多也獄之初興或只一人而辭之所逮或及兩人初只一事而情之連引遂及兩事由是加上而備多故曰其刑上備有并兩刑夫獄既成用刑者信其無失固已為難至於受刑者亦自信而無憾為尤難獄之初起於一人其推讞固宜哀敬審克至於逮繫連引之多尤宜哀敬審克故此二條特言於終以明折獄之道必如是而後為至此一節申明何度非及之意管仲奪伯氏駢邑三百沒齒無怨言蜀李嚴有罪諸葛孔明黜之孔明卒嚴垂涕此所謂輸者也此一節蔡傳儘好但末一條管見頗異望通是經者再訂之明清于單辭單盡也於義亦通五經蠡測卷二
